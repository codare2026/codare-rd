// 通知學員對話框（通用）
// ══════════════════════════════════════
const NOTIFY_DEFAULTS = {
  weekplan: (week) => `📋 W${week} 週計畫已更新！本週的熱量設定、餐次份數分配與每週小目標都已設定好，請到「身體數值」頁面查看本週計畫，一起加油！`,
  bodytrack: () => `⚖️ 體態追蹤資料已更新！營養師已記錄最新數值，請到「身體數值」查看你的進度與變化趨勢。`,
  menu: (period) => `🥗 第 ${period} 期菜單已更新！本週的客製化菜單已上線，請到「菜單」頁面查看，按照菜單吃讓效果更好！`,
  materials: () => `📚 新教材已上傳！營養師為你上傳了新的學習資料，請到「教材」頁面查看，有助於了解均衡飲食的知識！`,
};

function showNotifyDialog(studentId, type, titleLabel, defaultMsgFn, onSaveFirst) {
  // First execute the save operation
  if (onSaveFirst) onSaveFirst();

  const defaultMsg = typeof defaultMsgFn === 'function' ? defaultMsgFn() : defaultMsgFn;

  showModal(`📣 通知學員：${titleLabel}`, `
    <div style="margin-bottom:12px;font-size:13px;color:var(--g5)">
      儲存成功！請輸入要傳給 <strong>${getStudentName(studentId)}</strong> 的通知內容，或點「用預設文字」快速填入。
    </div>
    <textarea id="notify-msg-input" rows="5"
      style="width:100%;border:1.5px solid var(--g2);border-radius:10px;padding:12px;font-size:13px;font-family:inherit;resize:vertical;outline:none;line-height:1.7;box-sizing:border-box"
      onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'"
      placeholder="輸入通知內容…"></textarea>
    <button class="btn btn-outline btn-sm" style="margin-top:8px;font-size:12px" onclick="document.getElementById('notify-msg-input').value=\`${defaultMsg.replace(/`/g,'&#96;')}\`">
      ✨ 用預設文字
    </button>
  `, [
    { label: '取消（不通知）', action: 'closeModal()', style: 'btn-outline' },
    { label: '📣 送出通知給學員', action: `doSendNotify('${studentId}','${type}')`, style: 'btn-teal' }
  ]);
}

function getStudentName(id) {
  const all = [...getActiveStudents(), ...getMyStudents()];
  return all.find(s => s.id === id)?.name || id;
}

function doSendNotify(studentId, type) {
  const msg = document.getElementById('notify-msg-input')?.value?.trim();
  if (!msg) { showToast('請輸入通知內容或使用預設文字'); return; }
  const typeIconMap = { weekplan:'📋', bodytrack:'⚖️', menu:'🥗', materials:'📚', general:'📬' };
  const typeTitleMap = { weekplan:'週計畫已更新', bodytrack:'體態資料已更新', menu:'菜單已更新', materials:'新教材上傳', general:'來自營養師的通知' };
  pushInbox(studentId, {
    type,
    title: `${typeIconMap[type]||'📬'} ${typeTitleMap[type]||'通知'}`,
    body: msg
  });
  closeModal();
  showToast('📣 已成功通知學員！');
}

// ── 週計畫份數：從下拉選單組合字串 ──
function buildMealStr(mealKey) {
  const cats = ['c','p','v','f','d','o'];
  const labels = ['C','P','V','F','D','O'];
  return labels.map((L, i) => {
    const el = document.getElementById(`wp-${mealKey}-${cats[i]}`);
    const v = el ? parseFloat(el.value) || 0 : 0;
    return `${L} ${v}`;
  }).join('｜');
}

function buildTotalStr() {
  const meals = ['b','l','d','s'];
  const cats = ['c','p','v','f','d','o'];
  const labels = ['C','P','V','F','D','O'];
  const totals = labels.map((L, i) => {
    let sum = 0;
    meals.forEach(m => {
      const el = document.getElementById(`wp-${m}-${cats[i]}`);
      sum += el ? parseFloat(el.value) || 0 : 0;
    });
    return `${L} ${sum % 1 === 0 ? sum : sum.toFixed(1)}`;
  });
  return totals.join('｜');
}

function autoCalcTotal() {
  const totalStr = buildTotalStr();
  const display = document.getElementById('wp-total-display');
  const hidden = document.getElementById('wp-total');
  if (display) display.textContent = totalStr;
  if (hidden) hidden.value = totalStr;
}

    date: document.getElementById('wp-date')?.value || '',
    calories: cal ? cal + ' 大卡' : '',
    weight: document.getElementById('wp-wt')?.value || '',
    fat: document.getElementById('wp-fat')?.value || '',
    waist: document.getElementById('wp-waist')?.value || '',
    session: document.getElementById('wp-session')?.value || '',
    breakfast: buildMealStr('b'),
    lunch:     buildMealStr('l'),
    dinner:    buildMealStr('d'),
    snack:     buildMealStr('s'),
    total:     buildTotalStr(),
    exercise: document.getElementById('wp-ex')?.value || '',
    note: document.getElementById('wp-note')?.value || ''
  };
  ss(`wplan_${studentId}_${week}`, plan);

    const existing2 = gs(`goals_${studentId}_${week}`) || [];
    return { text: el.value.trim(), done: existing2[i]?.done || false };

  ss(`goals_${studentId}_${week}`, goals);

  showNotifyDialog(

function copyPrevDay(p, di) {
  const meals = [
    { from: `m-${p}-${di-1}-b`, to: `m-${p}-${di}-b` },
    { from: `m-${p}-${di-1}-l`, to: `m-${p}-${di}-l` },
    { from: `m-${p}-${di-1}-d`, to: `m-${p}-${di}-d` },
    { from: `m-${p}-${di-1}-s`, to: `m-${p}-${di}-s` },
  ];
  meals.forEach(({ from, to }) => {
    const src = document.getElementById(from);
    const dst = document.getElementById(to);
    if (src && dst) dst.value = src.value;
  });
  // 複製份數分配下拉選單
  const cats = ['c','p','v','f','d','o'];
  cats.forEach(cat => {
    const src = document.getElementById(`m-${p}-${di-1}-cpv-${cat}`);
    const dst = document.getElementById(`m-${p}-${di}-cpv-${cat}`);
    if (src && dst) dst.value = src.value;
  });
  showToast(`✅ 已複製週${['一','二','三','四','五','六','日'][di-1]}的內容`);
}

function switchMenuStudent(id) { menuStudentId = id; document.getElementById('main-content').innerHTML = renderMenuMgr(); }

function saveMenu(studentId, period) {
  const allMenus = gs(`menus_${studentId}`) || {};
  const DAYS = ['一','二','三','四','五','六','日'];
  const days = DAYS.map((name, di) => ({
    name,
    breakfast: document.getElementById(`m-${period}-${di}-b`)?.value || '',
    lunch:     document.getElementById(`m-${period}-${di}-l`)?.value || '',
    dinner:    document.getElementById(`m-${period}-${di}-d`)?.value || '',
    snack:     document.getElementById(`m-${period}-${di}-s`)?.value || '',
    cpvfdo:    (() => {
      const cats = ['C','P','V','F','D','O'];
      const parts = cats.map(cat => {
        const v = document.getElementById(`m-${period}-${di}-cpv-${cat.toLowerCase()}`)?.value || '0';
        return `${cat} ${v}`;
      });
      return parts.join('｜');
    })()
  }));
  allMenus[period] = {
    label: document.getElementById(`mlabel-${period}`)?.value || `第${period}期菜單`,
    note: document.getElementById(`mnote-${period}`)?.value || '',
    days
  };
  ss(`menus_${studentId}`, allMenus);
  showNotifyDialog(
    studentId, 'menu', `第 ${period} 期菜單`,
    () => NOTIFY_DEFAULTS.menu(period)
  );
}

function addMenuPeriod(studentId) {
  const allMenus = gs(`menus_${studentId}`) || {};
  const periods = Object.keys(allMenus).map(Number);
  const nextP = periods.length > 0 ? Math.max(...periods) + 1 : 1;
  allMenus[nextP] = { label: `第${nextP}期菜單`, note: '每週參照此份菜單循環使用', days: [] };
  ss(`menus_${studentId}`, allMenus);
  showToast(`✅ 已新增第 ${nextP} 期菜單，請填寫內容後儲存`);
  document.getElementById('main-content').innerHTML = renderMenuMgr();
}

function confirmDeleteMenu(studentId, period) {
  showModal(`🗑️ 刪除第 ${period} 期菜單`, `
    <div class="notice amber">⚠️ 確定要刪除「第 ${period} 期菜單」嗎？刪除後學員 App 的菜單頁將看不到此期內容，且無法復原。</div>
  `, [
    { label: '取消', action: 'closeModal()', style: 'btn-outline' },
    { label: '確定刪除', action: `deleteMenu('${studentId}',${period})`, style: 'btn-teal' }
  ]);
}

function deleteMenu(studentId, period) {
  const allMenus = gs(`menus_${studentId}`) || {};
  delete allMenus[period];
  ss(`menus_${studentId}`, allMenus);
  closeModal();
  showToast(`🗑️ 第 ${period} 期菜單已刪除`);
  document.getElementById('main-content').innerHTML = renderMenuMgr();
}

// 圖片壓縮：最長邊限 1200px，JPEG 品質 0.75
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1200;
        let { width: w, height: h } = img;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL('image/jpeg', 0.75);
        const origKB = Math.round(file.size / 1024);
        const newKB  = Math.round(compressed.length * 0.75 / 1024);
        resolve({ name: file.name, type: 'image/jpeg', data: compressed, sizeMB: (newKB/1024).toFixed(1), origKB, newKB });
      };
      img.onerror = () => resolve({ name: file.name, type: file.type, data: e.target.result, sizeMB: (file.size/1024/1024).toFixed(1) });
      img.src = e.target.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(file);
  });
}

function readEncyFiles(files) {
  const preview = document.getElementById('ency-file-preview');
  if (preview) { preview.innerHTML = `⏳ 讀取中… 共 ${files.length} 個檔案`; preview.style.display = 'block'; }
  pendingEncyFiles = [];

  const tasks = files.map(file => {
    if (file.type === 'application/pdf') {
      // PDF 不壓縮
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = e => resolve({ name: file.name, type: file.type, data: e.target.result, sizeMB: (file.size/1024/1024).toFixed(1) });
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(file);
      });
    } else {
      // 圖片壓縮
      return compressImage(file);
    }
  });

  Promise.all(tasks).then(results => {
    pendingEncyFiles = results.filter(Boolean);
    if (preview) {
      preview.innerHTML = files.map((f, i) => {
        const r = pendingEncyFiles[i];
        const icon = f.type === 'application/pdf' ? '📄' : '🖼️';
        const sizeInfo = r?.origKB ? ` <span style="color:var(--teal);font-size:10px">${r.origKB}KB → ${r.newKB}KB ✓</span>` : '';
        return `${icon} ${f.name}${sizeInfo}`;
      }).join('<br>') + `<br>✅ ${pendingEncyFiles.length} 個檔案已選取`;
    }
  });
}

async function addEncy(studentId) {
  const title = document.getElementById('ency-title')?.value?.trim();
  const desc = getEncyDesc();   // selected option value = catKey or course_N
  if (!title) { showToast('請選擇教材類型'); return; }
  if (!desc) { showToast('請選擇說明/章節'); return; }

  const category = title === '線上教學影片' ? 'course' : 'ency';
  // catKey is the stable routing key; desc is for display in RD table
  const catKey = desc;  // e.g. 'food_grain', 'course_1'

  // Human-readable label for RD table display
  const descLabel = (() => {
    if (category === 'course') {
      const opt = ENCY_COURSE_OPTIONS.find(o => o.val === desc);
      return opt ? opt.label : desc;
    } else {
      const opt = ENCY_FOOD_OPTIONS.find(o => o.val === desc);
      return opt ? opt.label : desc;
    }
  })();

  try {
    const existingItems = gs(`ency_${studentId}`) || [];

    if (encyTabMode === 'link') {
      const url = document.getElementById('ency-link-url')?.value?.trim();
      if (!url) { showToast('請貼上連結網址'); return; }
      existingItems.push({
        title, desc: catKey, catKey, descLabel, category,
        uploadedAt: Date.now(), uploadedAtStr: new Date().toLocaleDateString('zh-TW'),
        linkUrl: url, fileType: 'link',
        icon: category === 'course' ? '🎥' : '📋'
      });
    } else if (pendingEncyFiles.length > 0) {
      // 上傳到 Supabase Storage，只存 URL（大幅節省流量）
      showLoading('上傳教材中…');
      const uploadPromises = pendingEncyFiles.map(async (f) => {
        const fileType = f.type === 'application/pdf' ? 'pdf' : 'image';
        const storageUrl = await uploadToStorage(f.data, f.name, `${studentId}/${catKey}`);
        return {
          title,
          desc: catKey,
          catKey,
          descLabel: pendingEncyFiles.length === 1 ? descLabel : `${descLabel} — ${f.name}`,
          fileName: f.name,
          category,
          uploadedAt: Date.now(), uploadedAtStr: new Date().toLocaleDateString('zh-TW'),
          fileUrl: storageUrl || null,   // Storage URL（省流量）
          fileData: storageUrl ? null : f.data, // fallback: base64（Storage失敗時）
          fileType,
          icon: fileType === 'pdf' ? '📄' : '🖼️'
        };
      });
      const uploaded = await Promise.all(uploadPromises);
      uploaded.forEach(item => existingItems.push(item));
      hideLoading();
    } else {
      existingItems.push({
        title, desc: catKey, catKey, descLabel, category,
        uploadedAt: Date.now(), uploadedAtStr: new Date().toLocaleDateString('zh-TW'),
        icon: category === 'course' ? '🎥' : '📋', fileType: 'none'
      });
    }

    ss(`ency_${studentId}`, existingItems);
    const count = pendingEncyFiles.length || 1;
    pendingEncyFile = null;
    pendingEncyFiles = [];
    showToast(`✅ 已新增 ${count} 份教材！`);
    document.getElementById('main-content').innerHTML = renderMaterials();
    // Show notify dialog
    showNotifyDialog(
      studentId, 'materials', '教材上傳',
      () => NOTIFY_DEFAULTS.materials()
    );
  } catch(e) {
    showToast('⚠️ 儲存空間不足，建議改用「貼上連結」方式上傳大型檔案');
  }
}

function deleteEncy(studentId, idx) {

let _rdApiKey = ''; // kept for compatibility

async function generateAIReport(studentId) {
  const btn = document.getElementById('generate-btn');
  const out = document.getElementById('report-output');
  if (!btn || !out) return;

  btn.textContent = '⏳ 分析中…'; btn.disabled = true;
  out.innerHTML = `
    <div class="card" style="text-align:center;padding:40px 20px">
      <div class="rd-spinner" style="border-color:rgba(0,0,0,0.08);border-top-color:var(--teal);width:48px;height:48px;border-width:4px;margin:0 auto 16px"></div>
      <div style="font-size:15px;font-weight:600;color:var(--g7);margin-bottom:6px">📊 正在統整學員資料</div>
      <div style="font-size:13px;color:var(--g4)">自動讀取飲食紀錄、體態數值、生活習慣…</div>
    </div>`;

  await new Promise(r => setTimeout(r, 600));

  // Get student info — try STUDENTS_DB first, then gs() fallback
  let s = getActiveStudents().find(x => x.id === studentId);
  if (!s) {
    const dyn = gs(`dynuser_${studentId}`);
    if (dyn) s = { ...dyn, id: studentId };
  }
  if (!s) {
    // Try fetching directly from Supabase
    try {
      const res = await fetch(`${SB_URL}/rest/v1/cd?key=eq.dynuser_${studentId}&select=value`, { headers: SB_HDRS });
      if (res.ok) { const rows = await res.json(); if (rows[0]?.value) s = { ...rows[0].value, id: studentId }; }
    } catch(e) {}
  }
  if (!s) {
    out.innerHTML = `<div class="card"><div class="notice amber">⚠️ 找不到學員資料，請先點「🔄 同步」再試</div></div>`;
    btn.textContent = '📊 生成結案報告'; btn.disabled = false;
    return;
  }

  const sDates = buildStudentDates(s.start, s.end);
  const totalDays = sDates.length;

  // ── 飲食分析 ──
  const foodDays = sDates.map(d => gs(`food_${s.id}_${d}`)).filter(Boolean);
  const uploadedDays = foodDays.filter(f => f.notified).length;
  const uploadRate = totalDays ? Math.round(uploadedDays / totalDays * 100) : 0;

  // 飲食類型統計
  const allFoodText = foodDays.flatMap(f => [f.breakfast, f.lunch, f.dinner, f.snack1, f.snack2].filter(Boolean)).join(' ');
  const hasVeg = (allFoodText.match(/菜|蔬菜|青菜|葉菜|花椰|菠菜|空心/g) || []).length;
  const hasFruit = (allFoodText.match(/水果|蘋果|香蕉|橘子|芭樂|葡萄|奇異果/g) || []).length;
  const hasProtein = (allFoodText.match(/雞|豬|牛|魚|蛋|豆腐|豆漿|海鮮/g) || []).length;
  const hasJunk = (allFoodText.match(/炸|薯條|漢堡|披薩|珍珠奶茶|珍奶|鹹酥|泡麵|速食/g) || []).length;
  const hasDrink = (allFoodText.match(/飲料|手搖|奶茶|果汁|汽水|可樂/g) || []).length;

  // 運動統計
  const exerciseDays = foodDays.filter(f => f.exType).length;
  const exerciseRate = foodDays.length ? Math.round(exerciseDays / foodDays.length * 100) : 0;
  const avgWater = foodDays.filter(f => f.water).length
    ? Math.round(foodDays.filter(f => f.water).reduce((a, f) => a + Number(f.water), 0) / foodDays.filter(f => f.water).length)
    : 0;
  const avgSleep = foodDays.filter(f => f.sleep).length
    ? (foodDays.filter(f => f.sleep).reduce((a, f) => a + Number(f.sleep), 0) / foodDays.filter(f => f.sleep).length).toFixed(1)
    : 0;

  // ── 體態分析 ──
  const progArr = gs(`progress_${studentId}`) || [];
  const progWithWeight = progArr.filter(p => p && p.weight);
  const firstW = progWithWeight[0]?.weight;
  const lastW = progWithWeight[progWithWeight.length - 1]?.weight;
  const weightChange = (firstW && lastW && firstW !== lastW) ? (lastW - firstW).toFixed(1) : null;
  const firstFat = progWithWeight[0]?.fat;
  const lastFat = progWithWeight[progWithWeight.length - 1]?.fat;
  const fatChange = (firstFat && lastFat && firstFat !== lastFat) ? (lastFat - firstFat).toFixed(1) : null;

  // ── 評分計算 ──
  let dietScore = 60;
  if (uploadRate >= 80) dietScore += 15;
  else if (uploadRate >= 60) dietScore += 8;
  if (hasVeg >= 5) dietScore += 8;
  if (hasFruit >= 3) dietScore += 5;
  if (hasProtein >= 5) dietScore += 7;
  if (hasJunk >= 5) dietScore -= 10;
  if (hasDrink >= 5) dietScore -= 8;
  dietScore = Math.min(99, Math.max(40, dietScore));

  let lifeScore = 60;
  if (exerciseRate >= 50) lifeScore += 15;
  else if (exerciseRate >= 30) lifeScore += 8;
  if (avgWater >= 1500) lifeScore += 10;
  else if (avgWater >= 1000) lifeScore += 5;
  if (Number(avgSleep) >= 7) lifeScore += 10;
  else if (Number(avgSleep) >= 6) lifeScore += 5;
  lifeScore = Math.min(99, Math.max(40, lifeScore));

  let weightScore = 60;
  if (progWithWeight.length >= 2) {
    const wDiff = Number(weightChange);
    if (!isNaN(wDiff)) {
      if (s.goal?.includes('減') || s.goal?.includes('降')) {
        if (wDiff < -1) weightScore += 25;
        else if (wDiff < 0) weightScore += 15;
        else if (wDiff === 0) weightScore += 5;
        else weightScore -= 10;
      } else {
        weightScore += 15;
      }
    }
  } else {
    weightScore = 55; // 資料不足
  }
  weightScore = Math.min(99, Math.max(40, weightScore));

  const overallScore = Math.round((dietScore + lifeScore + weightScore) / 3);

  // ── 組合評語 ──
  const dietComments = [];
  if (uploadRate >= 80) dietComments.push(`飲食紀錄完成率 ${uploadRate}%，記錄習慣非常良好`);
  else if (uploadRate >= 60) dietComments.push(`飲食紀錄完成率 ${uploadRate}%，建議持續記錄`);
  else dietComments.push(`飲食紀錄完成率 ${uploadRate}%，建議加強每日記錄習慣`);
  if (hasVeg >= 5) dietComments.push('蔬菜攝取頻率佳');
  if (hasProtein >= 5) dietComments.push('蛋白質來源豐富');
  if (hasJunk >= 5) dietComments.push('高油高糖食物出現次數偏多，建議減少');
  if (hasDrink >= 5) dietComments.push('含糖飲料攝取偏頻繁，建議改喝無糖飲品');

  const lifeComments = [];
  if (exerciseDays > 0) lifeComments.push(`課程期間共有 ${exerciseDays} 天有運動紀錄（${exerciseRate}%）`);
  else lifeComments.push('課程期間缺乏運動紀錄，建議增加身體活動');
  if (avgWater >= 1500) lifeComments.push(`平均飲水 ${avgWater}ml，飲水習慣良好`);
  else if (avgWater > 0) lifeComments.push(`平均飲水 ${avgWater}ml，建議提升至每日 1500ml 以上`);
  if (Number(avgSleep) >= 7) lifeComments.push(`平均睡眠 ${avgSleep} 小時，作息規律`);
  else if (Number(avgSleep) > 0) lifeComments.push(`平均睡眠 ${avgSleep} 小時，建議睡足 7 小時`);

  const weightComments = [];
  if (firstW) weightComments.push(`起始體重 ${firstW} kg`);
  if (lastW && firstW !== lastW) {
    weightComments.push(`目前體重 ${lastW} kg，共${Number(weightChange) < 0 ? '減少' : '增加'} ${Math.abs(weightChange)} kg`);
  }
  if (fatChange) weightComments.push(`體脂率${Number(fatChange) < 0 ? '下降' : '上升'} ${Math.abs(fatChange)}%`);
  if (!firstW) weightComments.push('尚無體重紀錄');

  const strengths = [];
  if (uploadRate >= 70) strengths.push(`飲食記錄完成率高達 ${uploadRate}%，執行力優秀`);
  if (exerciseDays >= 3) strengths.push(`課程期間有 ${exerciseDays} 天運動紀錄，持續培養運動習慣`);
  if (hasVeg >= 5) strengths.push('蔬菜攝取意識良好，三餐有蔬菜的頻率高');
  if (hasProtein >= 5) strengths.push('蛋白質攝取充足，有助肌肉維持');
  if (avgWater >= 1500) strengths.push('飲水量達標，有助代謝與身體機能');
  if (Number(avgSleep) >= 7) strengths.push('睡眠時間充足，有助荷爾蒙調節與減重');
  if (strengths.length === 0) strengths.push('完成本次課程，邁出健康管理的第一步');

  const improvements = [];
  if (uploadRate < 70) improvements.push('加強每日飲食記錄習慣，有記錄才有改變');
  if (exerciseDays < 3) improvements.push('建議每週至少 3 天有氧或阻力訓練');
  if (avgWater < 1500 && avgWater > 0) improvements.push('每日飲水目標 1500ml 以上，可隨身攜帶水瓶');
  if (hasJunk >= 5) improvements.push('減少高油高糖食物，外食優先選擇清淡料理');
  if (hasDrink >= 5) improvements.push('飲料改選無糖版，或以水、無糖茶代替');
  if (improvements.length === 0) improvements.push('持續維持良好的飲食與生活習慣');

  const report = {
    title: `${s.name} 課程結案報告`,
    summary: `${s.name} 完成為期 ${totalDays} 天的營養課程（${s.start} ～ ${s.end}）。飲食紀錄完成率 ${uploadRate}%，${weightChange ? `體重共變化 ${weightChange} kg。` : ''}整體課程執行${uploadRate >= 70 ? '積極' : '尚有進步空間'}。`,
    diet: { score: dietScore, comment: dietComments.join('；') + '。' },
    lifestyle: { score: lifeScore, comment: lifeComments.join('；') + '。' },
    weight: { score: weightScore, comment: (weightComments.join('；') || '體態資料尚不完整') + '。' },
    overall: { score: overallScore, comment: `本次課程 ${s.name} 在營養師指導下${weightChange && Number(weightChange) < 0 ? `成功減少 ${Math.abs(weightChange)} kg，` : ''}建立了飲食記錄習慣。建議持續維持均衡飲食、規律運動，並定期回診追蹤體態數值，讓成果得以長期維持。` },
    strengths: strengths.slice(0, 3),
    improvements: improvements.slice(0, 3)
  };

  reportContent = report;
  renderReportOutput(s, report);
  btn.textContent = '🔄 重新生成'; btn.disabled = false;
}

function scoreToGrade(score) {
  if (score >= 90) return { grade: 'S', color: '#7c3aed', bg: '#ede9fe', label: 'S 級・傑出' };
  if (score >= 80) return { grade: 'A', color: '#0d9488', bg: '#ccfbf1', label: 'A 級・優秀' };
  if (score >= 70) return { grade: 'B', color: '#2563eb', bg: '#dbeafe', label: 'B 級・良好' };
  if (score >= 55) return { grade: 'C', color: '#d97706', bg: '#fef3c7', label: 'C 級・尚可' };
  return { grade: 'D', color: '#dc2626', bg: '#fee2e2', label: 'D 級・待加強' };
}

function renderReportOutput(s, r) {
  const btn = document.getElementById('generate-btn');
  if (btn) { btn.textContent = '🔄 重新生成'; btn.disabled = false; }
  const out = document.getElementById('report-output');
  if (!out) return;

  const scores = [r.diet?.score||0, r.lifestyle?.score||0, r.weight?.score||0];
  const labels = ['飲食', '生活習慣', '體重體脂'];

  // Radar chart
  const cx=120, cy=120, R=85;
  function pt(a, r2) { const rad=(a-90)*Math.PI/180; return [cx+r2*Math.cos(rad), cy+r2*Math.sin(rad)]; }
  const angles = [0,120,240];
  const grid = [25,50,75,100].map(p => `<polygon points="${angles.map(a=>pt(a,R*p/100).join(',')).join(' ')}" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>`).join('');
  const axes = angles.map(a => { const [x,y]=pt(a,R); return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>`; }).join('');
  const dpts = angles.map((a,i) => pt(a,R*scores[i]/100).join(',')).join(' ');
  const lbls = angles.map((a,i) => {
    const [x,y]=pt(a,R+22);
    const g = scoreToGrade(scores[i]);
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="#374151">${labels[i]}</text>`;
  }).join('');
  const dots = angles.map((a,i) => {
    const [x,y]=pt(a,R*scores[i]/100);
    const g = scoreToGrade(scores[i]);
    return `<circle cx="${x}" cy="${y}" r="5" fill="${g.color}"/><text x="${x}" y="${y-12}" text-anchor="middle" font-size="11" font-weight="900" fill="${g.color}">${g.grade}</text>`;
  }).join('');
  const radar = `<svg viewBox="0 0 240 240" width="190" height="190" style="display:block;margin:0 auto">${grid}${axes}<polygon points="${dpts}" fill="rgba(13,148,136,0.15)" stroke="#0d9488" stroke-width="2.5"/>${lbls}${dots}</svg>`;

  // Grade items
  const gradeItems = [{key:'diet',label:'🍽️ 飲食'},{key:'lifestyle',label:'🏃 生活習慣'},{key:'weight',label:'⚖️ 體重體脂'}].map(item => {
    const g = scoreToGrade(r[item.key]?.score || 0);
    return `
    <div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:13px;font-weight:700">${item.label}</span>
        <span style="background:${g.bg};color:${g.color};border-radius:8px;padding:2px 12px;font-size:13px;font-weight:900">${g.label}</span>
      </div>
      <div style="background:var(--g2);height:7px;border-radius:4px;overflow:hidden;margin-bottom:6px">
        <div style="background:${g.color};height:100%;width:${r[item.key]?.score||0}%;border-radius:4px;transition:width 0.6s"></div>
      </div>
      <div id="rpt-${item.key}" style="font-size:12px;color:var(--g6);line-height:1.6">${r[item.key]?.comment||''}</div>
    </div>`;
  }).join('');

  // Strengths and improvements as editable textareas (always visible)
  const strengthsText = (r.strengths||[]).map(t => `・${t}`).join('\n');
  const improvementsText = (r.improvements||[]).map(t => `・${t}`).join('\n');

  out.innerHTML = `<div class="card" id="report-card">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <div>
        <div style="font-size:18px;font-weight:900">${r.title||s.name+' 課程結案報告'}</div>
        <div style="font-size:12px;color:var(--g4);margin-top:3px">${s.start} ～ ${s.end}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-outline btn-sm" id="edit-toggle-btn" onclick="toggleReportEdit()">✏️ 編輯</button>
        <button class="btn btn-teal btn-sm" onclick="exportReportPDF()">📄 輸出 PDF</button>
      </div>
    </div>

    <!-- Summary -->
    <div style="background:var(--g0);border-radius:10px;padding:12px;font-size:13px;color:var(--g6);line-height:1.7;margin-bottom:16px" id="rpt-summary-display">${r.summary||''}</div>
    <textarea id="rpt-summary-edit" rows="2" style="display:none;width:100%;border:1.5px solid var(--teal);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;outline:none;margin-bottom:16px">${r.summary||''}</textarea>

    <!-- Radar + Grades -->
    <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px">
      <div style="flex-shrink:0">${radar}</div>
      <div style="flex:1;min-width:200px">${gradeItems}</div>
    </div>

    <!-- Edit comment textareas (hidden by default) -->
    <div id="rpt-comments-edit" style="display:none;margin-bottom:16px;padding:14px;background:var(--g0);border-radius:10px;border:1.5px solid var(--teal)">
      <div style="font-size:12px;font-weight:700;color:var(--teal);margin-bottom:10px">✏️ 編輯各面向評語</div>
      ${[{id:'e-diet',label:'飲食評語',key:'diet'},{id:'e-life',label:'生活習慣評語',key:'lifestyle'},{id:'e-wt',label:'體重體脂評語',key:'weight'}].map(f=>`
      <div style="margin-bottom:10px">
        <label style="font-size:11px;font-weight:700;color:var(--g5);display:block;margin-bottom:4px">${f.label}</label>
        <textarea id="${f.id}" rows="2" style="width:100%;border:1.5px solid var(--g2);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;outline:none">${r[f.key]?.comment||''}</textarea>
      </div>`).join('')}
      <button class="btn btn-teal btn-sm" onclick="saveCommentEdits()">✅ 儲存評語</button>
    </div>

    <div class="divider"></div>

    <!-- Overall summary -->
    <div style="margin-bottom:14px">
      <div style="font-weight:700;font-size:13px;margin-bottom:6px">📝 整體總結</div>
      <div id="rpt-overall-display" style="font-size:13px;line-height:1.8;color:var(--g7);background:var(--g0);padding:12px;border-radius:8px">${r.overall?.comment||''}</div>
      <textarea id="rpt-overall-edit" rows="4" style="display:none;width:100%;border:1.5px solid var(--teal);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;outline:none;margin-top:4px">${r.overall?.comment||''}</textarea>
    </div>

    <!-- Strengths & Improvements (always editable textareas) -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
      <div>
        <div style="font-weight:700;font-size:13px;color:var(--teal-dark);margin-bottom:8px">✅ 表現亮點</div>
        <div id="rpt-strengths-display">${(r.strengths||[]).map(t=>`<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--g1)">・${t}</div>`).join('')}</div>
        <textarea id="rpt-strengths-edit" rows="4" style="display:none;width:100%;border:1.5px solid var(--teal);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;outline:none">${strengthsText}</textarea>
      </div>
      <div>
        <div style="font-weight:700;font-size:13px;color:#b45309;margin-bottom:8px">💡 改善建議</div>
        <div id="rpt-improvements-display">${(r.improvements||[]).map(t=>`<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--g1)">・${t}</div>`).join('')}</div>
        <textarea id="rpt-improvements-edit" rows="4" style="display:none;width:100%;border:1.5px solid var(--teal);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;outline:none">${improvementsText}</textarea>
      </div>
    </div>
  </div>`;
}

let _reportEditMode = false;
function toggleReportEdit() {
  _reportEditMode = !_reportEditMode;
  const show = (id) => { const el = document.getElementById(id); if(el) el.style.display = ''; };
  const hide = (id) => { const el = document.getElementById(id); if(el) el.style.display = 'none'; };
  const set = (id, display) => { const el = document.getElementById(id); if(el) el.style.display = display; };

  if (_reportEditMode) {
    // Switch to edit mode
    set('rpt-summary-display', 'none');
    set('rpt-summary-edit', 'block');
    set('rpt-overall-display', 'none');
    set('rpt-overall-edit', 'block');
    set('rpt-comments-edit', 'block');
    set('rpt-strengths-display', 'none');
    set('rpt-strengths-edit', 'block');
    set('rpt-improvements-display', 'none');
    set('rpt-improvements-edit', 'block');
    document.getElementById('edit-toggle-btn').textContent = '💾 儲存修改';
    document.getElementById('edit-toggle-btn').style.background = 'var(--teal)';
    document.getElementById('edit-toggle-btn').style.color = '#fff';
  } else {
    // Save and switch back to display mode
    saveAllReportEdits();
    set('rpt-summary-display', '');
    set('rpt-summary-edit', 'none');
    set('rpt-overall-display', '');
    set('rpt-overall-edit', 'none');
    set('rpt-comments-edit', 'none');
    set('rpt-strengths-display', '');
    set('rpt-strengths-edit', 'none');
    set('rpt-improvements-display', '');
    set('rpt-improvements-edit', 'none');
    document.getElementById('edit-toggle-btn').textContent = '✏️ 編輯';
    document.getElementById('edit-toggle-btn').style.background = '';
    document.getElementById('edit-toggle-btn').style.color = '';
    showToast('✅ 報告已儲存！');
  }
}

function saveAllReportEdits() {
  const update = (editId, dispId) => {
    const val = document.getElementById(editId)?.value || '';
    const el = document.getElementById(dispId);
    if (el) el.innerHTML = val.split('\n').filter(l => l.trim()).map(l => `<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--g1)">${l}</div>`).join('') || val;
  };
  // Summary
  const sumVal = document.getElementById('rpt-summary-edit')?.value || '';
  const sumDisp = document.getElementById('rpt-summary-display');
  if (sumDisp) sumDisp.textContent = sumVal;
  // Overall
  const overallVal = document.getElementById('rpt-overall-edit')?.value || '';
  const overallDisp = document.getElementById('rpt-overall-display');
  if (overallDisp) overallDisp.textContent = overallVal;
  // Comments
  ['diet','lifestyle','weight'].forEach((key, i) => {
    const ids = ['e-diet','e-life','e-wt'];
    const val = document.getElementById(ids[i])?.value || '';
    const disp = document.getElementById('rpt-' + key);
    if (disp) disp.textContent = val;
  });
  // Strengths & improvements
  update('rpt-strengths-edit', 'rpt-strengths-display');
  update('rpt-improvements-edit', 'rpt-improvements-display');
}

function saveCommentEdits() {
  ['diet','lifestyle','weight'].forEach((key, i) => {
    const ids = ['e-diet','e-life','e-wt'];
    const val = document.getElementById(ids[i])?.value || '';
    const disp = document.getElementById('rpt-' + key);
    if (disp) disp.textContent = val;
  });
  showToast('✅ 評語已更新！');
}

function saveReportEdits() { saveAllReportEdits(); showToast('✅ 已儲存！'); }

function exportReportPDF() {
  const card = document.getElementById('report-card');
  if (!card) return;
  const win = window.open('', '_blank');
  if (!win) { showToast('請允許彈出視窗'); return; }
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>結案報告</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>body{font-family:'Noto Sans TC',sans-serif;padding:32px;color:#1f2937;max-width:800px;margin:0 auto}*{box-sizing:border-box}.btn{display:none}</style>
  </head><body>${card.innerHTML}</body></html>`);
  win.document.close();
  setTimeout(() => { win.focus(); win.print(); }, 800);
}

function showModal(title, bodyHTML, buttons = []) {
  const btnsHTML = buttons.map(b => `<button class="btn ${b.style}" onclick="${b.action}">${b.label}</button>`).join('');
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h2>${title}</h2>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${bodyHTML}</div>
        <div class="modal-footer">${btnsHTML}</div>
      </div>
    </div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }
