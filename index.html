<script>
// ── Supabase 設定 ──
const SB_URL  = 'https://iqfnbwyjehwdbxptquyr.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZm5id3lqZWh3ZGJ4cHRxdXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODU5MjcsImV4cCI6MjA5MjM2MTkyN30.F5XSv6TKkJfek8bLmYsgvYgD7cnLGLirpNwC7SqbNDY';
const SB_HDRS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' };

const _cache = {};

// ── 讀取（先 cache → localStorage 作為離線備援） ──
function gs(key) {
  if (_cache[key] !== undefined) return _cache[key];
  try { const v = localStorage.getItem('cd_' + key); return v ? JSON.parse(v) : null; } catch { return null; }
}

// ── 寫入（cache + localStorage + Supabase 同步） ──
function ss(key, val) {
  _cache[key] = val;
  try { if (val === null) localStorage.removeItem('cd_' + key); else localStorage.setItem('cd_' + key, JSON.stringify(val)); } catch {}
  sbWrite(key, val);
}

// ── 上傳檔案到 Supabase Storage ──
async function uploadToStorage(dataUrl, fileName, folder) {
  try {
    // Convert base64 dataUrl to blob
    const arr = dataUrl.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while(n--) u8arr[n] = bstr.charCodeAt(n);
    const blob = new Blob([u8arr], { type: mime });
    
    const ext = mime === 'application/pdf' ? 'pdf' : 'jpg';
    const path = `${folder}/${Date.now()}_${fileName.replace(/[^a-zA-Z0-9.]/g,'_')}.${ext}`;
    
    const res = await fetch(`${SB_URL}/storage/v1/object/ency/${path}`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': mime, 'x-upsert': 'true' },
      body: blob
    });
    if (!res.ok) throw new Error('Storage upload failed');
    return `${SB_URL}/storage/v1/object/public/ency/${path}`;
  } catch(e) {
    console.warn('Storage upload failed, using base64:', e.message);
    return null; // caller will fallback to base64
  }
}

// ── Supabase 寫入（使用 upsert 確保跨裝置同步） ──
async function sbWrite(key, val) {
  try {
    if (val === null) {
      await fetch(`${SB_URL}/rest/v1/cd?key=eq.${encodeURIComponent(key)}`, { method: 'DELETE', headers: SB_HDRS });
    } else {
      await fetch(`${SB_URL}/rest/v1/cd`, {
        method: 'POST',
        headers: { ...SB_HDRS, 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ key, value: val, updated_at: new Date().toISOString() })
      });
    }
  } catch(e) { console.warn('Supabase write error:', e.message); }
}

// ── 從 localStorage 預載 cache（瞬間啟動） ──
function preloadLocalCache() {
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('cd_')) {
        const k = key.slice(3);
        if (_cache[k] === undefined) {
          try { _cache[k] = JSON.parse(localStorage.getItem(key)); } catch {}
        }
      }
    }
  } catch(e) {}
}

// ── warmCache：增量同步，大幅節省流量 ──
async function warmCache() {
  preloadLocalCache();

  const GET_HDRS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

  const safeGet = async (url) => {
    try {
      const res = await Promise.race([
        fetch(url, { headers: GET_HDRS }),
        new Promise((_, r) => setTimeout(() => r(new Error('t')), 6000))
      ]);
      if (!res.ok) return [];
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    } catch(e) { return []; }
  };

  const save = (rows) => rows.forEach(({ key, value }) => {
    if (!key) return;
    _cache[key] = value;
    try { localStorage.setItem('cd_' + key, JSON.stringify(value)); } catch {}
    if (key.startsWith('rduser_')) {
      const rid = key.replace('rduser_', '');
      if (typeof DYNAMIC_RD_USERS !== 'undefined') DYNAMIC_RD_USERS[rid] = value;
    }
  });

  const rdId = currentRD?.id || '';
  const lastSyncKey = 'cd_last_sync_rd_' + rdId;
  const lastSync = localStorage.getItem(lastSyncKey);
  const now = new Date().toISOString();

  if (lastSync) {
    // 增量同步：只抓上次同步後有變動的資料（大幅節省流量）
    const rows = await safeGet(
      `${SB_URL}/rest/v1/cd?updated_at=gt.${encodeURIComponent(lastSync)}&select=key,value&limit=500&order=updated_at`
    );
    save(rows);
    if (rows.length > 0) localStorage.setItem(lastSyncKey, now);
  } else {
    // 第一次登入：完整同步本 RD 相關資料
    // Step 1: 抓 RD 本身資料 + 所有 dynuser_（找出本 RD 的學員）
    const [rdRows, dynRows, rduserRows] = await Promise.all([
      safeGet(`${SB_URL}/rest/v1/cd?key=ilike.%25${rdId}%25&select=key,value&limit=100`),
      safeGet(`${SB_URL}/rest/v1/cd?key=ilike.dynuser_%25&select=key,value&limit=200`),
      safeGet(`${SB_URL}/rest/v1/cd?key=ilike.rduser_%25&select=key,value&limit=50`),
    ]);
    save([...rdRows, ...dynRows, ...rduserRows]);

    // Step 2: 找出本 RD 的學員，抓各自資料
    const studentIds = new Set();
    const stuList = _cache[`rd_students_${rdId}`];
    if (Array.isArray(stuList)) stuList.forEach(id => studentIds.add(String(id)));
    dynRows.forEach(({ key, value }) => {
      if (key.startsWith('dynuser_') && value?.rd === rdId) {
        studentIds.add(key.replace('dynuser_', ''));
      }
    });

    if (studentIds.size > 0) {
      const fetches = [...studentIds].map(phone =>
        safeGet(`${SB_URL}/rest/v1/cd?key=ilike.%25${phone}%25&select=key,value&limit=200`)
      );
      const results = await Promise.all(fetches);
      results.forEach(rows => save(rows));
    }

    // 記錄本次同步時間
    localStorage.setItem(lastSyncKey, now);
  }
}

function bgSync() {
  setTimeout(async () => {
    try { await warmCache(); updateBadge(); } catch(e) {}
  }, 200);
}

// ── 儲存/載入動態學員資料（直接用 Supabase cd table） ──
async function saveDynUser(phone, data) {
  _cache['dynuser_' + phone] = data;
  try { localStorage.setItem('cd_dynuser_' + phone, JSON.stringify(data)); } catch {}
  await sbWrite('dynuser_' + phone, data);
}

async function loadDynUser(phone) {
  // 優先從 Supabase 讀取最新資料（跨裝置同步）
  try {
    const res = await fetch(`${SB_URL}/rest/v1/cd?key=eq.dynuser_${encodeURIComponent(phone)}&select=value`, { headers: SB_HDRS });
    if (res.ok) {
      const rows = await res.json();
      if (rows[0]?.value) {
        _cache['dynuser_' + phone] = rows[0].value;
        try { localStorage.setItem('cd_dynuser_' + phone, JSON.stringify(rows[0].value)); } catch {}
        return rows[0].value;
      }
    }
  } catch(e) {}
  // 備援：localStorage
  try { return JSON.parse(localStorage.getItem('cd_dynuser_' + phone)); } catch {}
  return null;
}
</script>

/* MENU EDITOR */

/* NOTICE */
.notice { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: flex; gap: 8px; align-items: flex-start; }
.notice.amber { background: var(--amber-light); border-left: 3px solid var(--amber); color: #92400e; }
.notice.blue { background: var(--blue-light); border-left: 3px solid var(--blue); color: #1e40af; }

/* SEARCH */

/* DIVIDER */

// ══════════════════════════════════════
// DATA

// ══ 動態新增的營養師帳號（從 Firebase cache 載入）
const DYNAMIC_RD_USERS = {};

// 四位超級管理員
const RD_USERS_STATIC = {
  tingxuan: { password: 'CoDare@ting', name: '亭瑄營養師', superAdmin: true, students: [] },
  chengfang: { password: 'CoDare@fang', name: '承芳營養師', superAdmin: true, students: [] },
  yutong:   { password: 'CoDare@tong', name: '禹彤營養師', superAdmin: true, students: [] },
  shengwei:  { password: 'CoDare@wei',  name: '勝崴營養師', superAdmin: true, students: [] }
};

// Static RD accounts are hardcoded - no need to sync on load

function getRdUser(id) {
  return RD_USERS_STATIC[id] || DYNAMIC_RD_USERS[id] || gs('rduser_' + id) || null;
}
const RD_USERS = RD_USERS_STATIC;
const STUDENTS_DB = {};

function buildStudentDates(startStr, endStr) {
  const parseDate = str => {
    if (!str) return null;
    const p = str.replace(/-/g,'/').split('/');
    if (p.length === 3) return new Date(+p[0], +p[1]-1, +p[2]);
    if (p.length === 2) return new Date(2026, +p[0]-1, +p[1]);
    return null;
  };
  const base = parseDate(startStr) || new Date(2026, 4, 25);
  const end  = parseDate(endStr);
  if (isNaN(base.getTime())) return [];
  const dates = [];
  for (let i = 0; i < 366; i++) {
    const d = new Date(base); d.setDate(base.getDate() + i);
    if (end && d > end) break;
    if (!end && i >= 29) break;
    dates.push(`${d.getMonth()+1}/${d.getDate()}`);
  }
  return dates;
}

function buildWeekGroups(dates) {
  const groups = [];
  for (let w = 0; w * 7 < dates.length; w++) {
    const chunk = dates.slice(w*7, (w+1)*7);
    if (!chunk.length) break;
    groups.push({ label: `W${w+1} ${chunk[0]}–${chunk[chunk.length-1]}`, dates: chunk });
  }
  return groups;
}

const COURSE_DATES = buildStudentDates('2026/05/25', '2026/06/22');

let currentRD = null;
let currentSection = 'dashboard';
let selectedStudentId = null;
let selectedFeedbackDay = null;
let feedbackStudentId = null;
let feedbackSearchKeyword = '';
let intakeStudentId = null;
let intakeTab = 'basic';

function toggleLoginPw() {
  const inp = document.getElementById('rd-pw');
  const btn = inp.nextElementSibling;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '顯示' : '隱藏';
}

async function doRdLogin() {
  const id = document.getElementById('rd-id').value.trim();
  const pw = document.getElementById('rd-pw').value;
  const keep = document.getElementById('rd-keep').checked;

  // 靜態帳號直接比對，不需要 fetch（最快）
  let u = RD_USERS_STATIC[id] || gs('rduser_' + id) || null;
  // 動態帳號才查 Supabase（加上短 timeout）
  if (!u) {
    try {
      const res = await Promise.race([
        fetch(`${SB_URL}/rest/v1/cd?key=eq.rduser_${encodeURIComponent(id)}&select=value`, { headers: SB_HDRS }),
        new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 2000))
      ]);
      if (res.ok) { const rows = await res.json(); if (rows[0]?.value) u = rows[0].value; }
    } catch(e) {}
  }

  if (u && u.password === pw) {
    currentRD = { ...u, id };

    document.getElementById('rd-err').style.display = 'none';
    // 永遠維持登入（除非使用者主動登出）
    localStorage.setItem('cd_rd_autologin', JSON.stringify({ id, pw }));

    // 立即啟動 App，背景同步 Supabase 資料（不讓使用者等待）
    preloadLocalCache();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('rd-loading-screen').style.display = 'none';
    launchRdApp();
    // 背景同步（登入後 300ms 執行，不阻擋 UI）
    setTimeout(async () => {
      try {
        await warmCache(); // warmCache 內部已包含 rduser_ 和所有學員資料
        updateBadge();
        // 靜默更新當前頁面
        const el = document.getElementById('main-content');
        if (el && currentSection) {
          const renders = { dashboard: renderDashboard, feedback: renderFeedback,
            students: renderStudentsPage, weekplan: renderWeekplan,
            menu: renderMenuMgr, materials: renderMaterials };
          if (renders[currentSection]) el.innerHTML = renders[currentSection]();
        }
      } catch(e) { console.warn('bg sync failed:', e.message); }
    }, 300);
  } else {
    document.getElementById('rd-err').style.display = 'block';
  }
}

function launchRdApp() {
  document.getElementById('rd-loading-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

function doRdLogout() {
  localStorage.removeItem('cd_rd_autologin');
  document.getElementById('app').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('more-menu').classList.remove('open');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('rd-pw').type = 'password';
  document.querySelector('.pw-eye').textContent = '顯示';
  currentRD = null;
  document.getElementById('rd-id').value = '';
  document.getElementById('rd-pw').value = '';
  document.getElementById('rd-keep').checked = false;
  Object.keys(_cache).forEach(k => delete _cache[k]);
  // 登出時清除增量同步時間戳，下次登入重新完整同步
  try {
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith('cd_last_sync_')) localStorage.removeItem(k);
    }
  } catch(e) {}
}

// Auto-login：最多等 0.3 秒，之後直接顯示登入畫面
(function() {
  const showLogin = () => {
    document.getElementById('rd-loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  };
  // 保險機制：最多等 1.5 秒，超過直接顯示登入
  const fallback = setTimeout(showLogin, 1500);

  (async () => {
    try {
      const saved = JSON.parse(localStorage.getItem('cd_rd_autologin'));
      if (!saved?.id || !saved?.pw) { clearTimeout(fallback); showLogin(); return; }

      // 靜態帳號直接比對（不需要 fetch）
      const u = RD_USERS_STATIC[saved.id] || gs('rduser_' + saved.id);
      if (u && u.password === saved.pw) {
        clearTimeout(fallback);
        currentRD = { ...u, id: saved.id };
        preloadLocalCache();
        document.getElementById('rd-loading-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'none';
        launchRdApp();
        setTimeout(async () => {
            try {
              await warmCache();
              updateBadge();
              const el = document.getElementById('main-content');
              if (el && currentSection) {
                const r = { dashboard: renderDashboard, feedback: renderFeedback,
                  students: renderStudentsPage, menu: renderMenuMgr, materials: renderMaterials };
                if (r[currentSection]) el.innerHTML = r[currentSection]();
              }
            } catch(e) { console.warn('auto bg sync failed:', e.message); }
          }, 300);
        return;
      }
      // 找不到就顯示登入畫面
      clearTimeout(fallback);
      showLogin();
    } catch(e) {
      clearTimeout(fallback);
      showLogin();
    }
  })();
})();

function formatDate(d) {
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() {
  const d = new Date();
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.remove('hidden');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
}
function getMyStudents() {
  const storedList = gs(`rd_students_${currentRD.id}`) || [];
  // Guard: ensure both are arrays even if stored data is corrupted
  const rdStudents = Array.isArray(currentRD.students) ? currentRD.students : [];
  const stored = Array.isArray(storedList) ? storedList : [];
  const allIds = [...new Set([...rdStudents, ...stored])];
  allIds.forEach(id => {
    if (!STUDENTS_DB[id]) {
      const dyn = gs(`dynuser_${id}`);
      if (dyn) STUDENTS_DB[id] = dyn;
    }
  });
  return allIds.map(id => ({ id, ...STUDENTS_DB[id] })).filter(s => s.name);
}
function getActiveStudents() {
  const savedStatus = gs(`rd_status_${currentRD.id}`) || {};
  return getMyStudents().filter(s => {
    const status = savedStatus[s.id] || s.status;
    return status !== 'ended';
  });
}
function countPendingFeedback() {
  let count = 0;
  getActiveStudents().forEach(s => {
    buildStudentDates(s.start, s.end).forEach(d => {
      const data = gs(`food_${s.id}_${d}`);
      if (!data || !data.notified) return;
      // Red dot disappears once ANY feedback (meal or overall) has been sent
      const hasAnyFeedback =
        (Array.isArray(data.rdFeedbacks) && data.rdFeedbacks.length > 0) ||
        !!data.rdFeedback ||
        ['breakfast','snack1','lunch','snack2','dinner','latenight'].some(m =>
          (Array.isArray(data[m + '_rdFeedbacks']) && data[m + '_rdFeedbacks'].length > 0) ||
          !!data[m + '_rdFeedback']
        );
      if (!hasAnyFeedback) count++;
    });
  });
  return count;
}
function countBodyNotifs() {
  // Count students who have notified body update (not yet cleared by RD)
  return getActiveStudents().filter(s => {
    const n = gs(`body_notif_${s.id}`);
    return n && n.notified && !n.rdSeen;
  }).length;
}

function updateBadge() {
  const n = countPendingFeedback();
  const badge = document.getElementById('badge-feedback');
  if (badge) { badge.textContent = n; badge.style.display = n > 0 ? '' : 'none'; }
  // Mobile bottom nav feedback badge
  const bnBadge = document.getElementById('bn-badge-feedback');
  if (bnBadge) { bnBadge.textContent = n; bnBadge.style.display = n > 0 ? '' : 'none'; }

  // Body notification badge
  const nb = countBodyNotifs();
  const bodyBadge = document.getElementById('badge-bodytrack');
  if (bodyBadge) { bodyBadge.textContent = nb; bodyBadge.style.display = nb > 0 ? '' : 'none'; }
  const bnBodyBadge = document.getElementById('bn-badge-bodytrack');
  if (bnBodyBadge) { bnBodyBadge.textContent = nb; bnBodyBadge.style.display = nb > 0 ? '' : 'none'; }
}

function toggleSbGroup(id) {
  const body = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!body) return;
  const collapsed = body.classList.contains('collapsed');
  body.classList.toggle('collapsed', !collapsed);
  if (arrow) arrow.textContent = collapsed ? '▾' : '▸';
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const main = document.getElementById('main-area');
  if (!sb) return;
  const isHidden = sb.style.width === '0px' || sb.classList.contains('sb-hidden');
  if (isHidden) {
    sb.style.cssText = 'width:220px;transform:translateX(0)';
    if (main) main.style.marginLeft = '220px';
    sb.classList.remove('sb-hidden');
  } else {
    sb.style.cssText = 'width:0;overflow:hidden;transform:translateX(-220px)';
    if (main) main.style.marginLeft = '0';
    sb.classList.add('sb-hidden');
  }
}

// ══════════════════════════════════════
// FEEDBACK
// ══════════════════════════════════════
function renderFeedback() {
  const students = getActiveStudents();
  const today = todayStr();

  if (!feedbackStudentId || !students.find(x => x.id === feedbackStudentId)) {
    feedbackStudentId = students[0]?.id || null;
  }
  if (!selectedFeedbackDay) selectedFeedbackDay = today;

  const studentTabs = students.map(s => {
    const hasPending = buildStudentDates(s.start, s.end).some(d => {
      const f = gs(`food_${s.id}_${d}`);
      return f && f.notified && !(Array.isArray(f.rdFeedbacks) ? f.rdFeedbacks.length : f.rdFeedback);
    });
    return `<button class="btn ${feedbackStudentId === s.id ? 'btn-teal' : 'btn-outline'}" style="font-size:13px;padding:7px 14px;position:relative" onclick="switchFeedbackStudent('${s.id}')">
      ${s.name}${hasPending ? '<span style="position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%"></span>' : ''}
    </button>`;
  }).join('');

  const s = students.find(x => x.id === feedbackStudentId);
  if (!s) return `<div class="page-header"><h1>飲食回覆</h1></div><div class="empty-placeholder"><div class="ei">🍱</div><p>尚無學員</p></div>`;

  // ── 關鍵字搜尋區塊 ──
  let searchResultHTML = '';
  if (feedbackSearchKeyword.trim()) {
    const kw = feedbackSearchKeyword.trim().toLowerCase();
    const sDates2 = buildStudentDates(s.start, s.end);
    const matches = [];
    sDates2.forEach(d => {
      const f = gs(`food_${s.id}_${d}`);
      if (!f) return;
      const mealKeys = ['breakfast','snack1','lunch','snack2','dinner','latenight'];
      mealKeys.forEach(mk => {
        const text = f[mk] || '';
        if (text.toLowerCase().includes(kw)) {
          matches.push({ date: d, meal: mk, text });
        }
      });
      if ((f.lifeNote || '').toLowerCase().includes(kw)) {
        matches.push({ date: d, meal: 'lifeNote', text: f.lifeNote });
      }
    });
    const mealLabel = { breakfast:'早餐', snack1:'上午點心', lunch:'午餐', snack2:'下午點心', dinner:'晚餐', latenight:'宵夜', lifeNote:'飲食札記' };
    searchResultHTML = `
    <div class="card" style="border:1.5px solid var(--teal)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="card-title" style="margin:0">🔍「${feedbackSearchKeyword}」搜尋結果：共 ${matches.length} 筆</div>
        <button class="btn btn-outline btn-sm" onclick="feedbackSearchKeyword='';document.getElementById('fb-search-input').value='';document.getElementById('main-content').innerHTML=renderFeedback()">✕ 清除</button>
      </div>
      ${matches.length === 0 ? '<div class="text-muted" style="padding:12px 0">查無紀錄</div>' :
        matches.map(m => `
        <div onclick="selectFeedbackDay('${m.date}')" style="cursor:pointer;padding:8px 0;border-bottom:1px solid var(--g1);display:flex;align-items:flex-start;gap:10px">
          <div style="flex-shrink:0">
            <div style="font-size:12px;font-weight:700;color:var(--teal)">${m.date}</div>
            <div style="font-size:11px;color:var(--g4)">${mealLabel[m.meal]||m.meal}</div>
          </div>
          <div style="font-size:13px;color:var(--g7);flex:1;line-height:1.5">${m.text.replace(new RegExp(feedbackSearchKeyword,'gi'), t => `<mark style="background:#fef08a;padding:0 2px;border-radius:2px">${t}</mark>`)}</div>
        </div>`).join('')}
    </div>`;
  }

  const sDates = buildStudentDates(s.start, s.end);
  const weekGroups = buildWeekGroups(sDates);

  const weekNavHTML = weekGroups.map(wg => {
    const chips = wg.dates.map(d => {
      const food = gs(`food_${s.id}_${d}`);
      const notified = food && food.notified;
      const hasFb = food && (Array.isArray(food.rdFeedbacks) ? food.rdFeedbacks.length : food.rdFeedback);
      const isToday = d === today;
      let cls = 'day-chip';
      if (d === selectedFeedbackDay) cls += ' active';
      else if (notified && !hasFb) cls += ' notified';
      else if (notified) cls += ' has-data';
      return `<button class="${cls}" onclick="selectFeedbackDay('${d}')">${d}${isToday ? '▸' : ''}</button>`;
    }).join('');
    return `<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--g4);margin-bottom:5px;letter-spacing:0.5px">${wg.label}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div>
    </div>`;
  }).join('');

  const food = gs(`food_${s.id}_${selectedFeedbackDay}`) || null;

  let contentHTML = '';
  if (!food || (!food.breakfast && !food.lunch && !food.dinner && !food.notified)) {
    contentHTML = `<div class="empty-placeholder"><div class="ei">🍽️</div><p>學員尚未上傳 ${selectedFeedbackDay} 的飲食紀錄</p></div>`;
  } else {
    const meals = [
      { label: '早餐', key: 'breakfast' }, { label: '點心（上午）', key: 'snack1' },
      { label: '午餐', key: 'lunch' }, { label: '點心（下午）', key: 'snack2' },
      { label: '晚餐', key: 'dinner' }, { label: '宵夜', key: 'latenight' }
    ];
    const mealBlocks = meals.map(m => {
      const text = food[m.key] || '';
      const imgs = food[m.key + '_imgs'] || [];
      if (!text && !imgs.length) return '';
      // Support array of feedback messages
      const mealFbArr = Array.isArray(food[m.key + '_rdFeedbacks'])
        ? food[m.key + '_rdFeedbacks']
        : (food[m.key + '_rdFeedback'] ? [{ text: food[m.key + '_rdFeedback'], at: food[m.key + '_rdFeedbackAt'], id: 0 }] : []);

      const fbBubbles = mealFbArr.map((fb, fi) => `
        <div style="background:var(--teal-light);border-left:3px solid var(--teal);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--teal-dark);margin-bottom:6px">
          <div style="white-space:pre-wrap">${fb.text}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
            <span style="font-size:10px;color:var(--g4)">${fb.at ? new Date(fb.at).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : ''}</span>
            <div style="display:flex;gap:4px">
              <button class="btn btn-sm" style="font-size:10px;padding:2px 7px;background:#fff;border:1px solid var(--teal);color:var(--teal);border-radius:4px;cursor:pointer"
                onclick="startEditMealFb('${m.key}',${fi},\`${fb.text.replace(/`/g,'&#96;')}\`)">✏️</button>
              <button class="btn btn-sm" style="font-size:10px;padding:2px 7px;background:#fff;border:1px solid var(--red);color:var(--red);border-radius:4px;cursor:pointer"
                onclick="deleteMealFeedback('${s.id}','${selectedFeedbackDay}','${m.key}',${fi})">🗑️</button>
            </div>
          </div>
        </div>`).join('');

      return `<div class="meal-block" style="margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--g1)">
        <div class="meal-block-title">${m.label}</div>
        ${imgs.length ? `<div class="photo-grid">${imgs.map(src => `<img class="photo-thumb" src="${src}" onclick="openLightbox('${src}')" alt="">`).join('')}</div>` : ''}
        <div class="meal-text ${!text ? 'empty' : ''}">${text || '（無文字描述）'}</div>
        <div style="margin-top:10px">
          ${fbBubbles}
          <div id="meal-edit-wrap-${m.key}" style="display:none;margin-bottom:6px">
            <textarea id="meal-edit-ta-${m.key}" rows="2" style="width:100%;border:1.5px solid var(--teal);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;resize:none;outline:none"></textarea>
            <div style="display:flex;gap:6px;margin-top:4px;justify-content:flex-end">
              <button class="btn btn-outline btn-sm" style="font-size:11px" onclick="document.getElementById('meal-edit-wrap-${m.key}').style.display='none'">取消</button>
              <button class="btn btn-teal btn-sm" style="font-size:11px" onclick="saveEditMealFb('${s.id}','${selectedFeedbackDay}','${m.key}')">更新</button>
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:flex-start">
            <textarea id="meal-fb-${m.key}" rows="2" placeholder="針對${m.label}回饋…新增一則" style="flex:1;border:1.5px solid var(--g2);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;resize:none;outline:none;line-height:1.5" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'"></textarea>
            <button class="btn btn-teal btn-sm" style="margin-top:2px;flex-shrink:0" onclick="saveMealFeedback('${s.id}','${selectedFeedbackDay}','${m.key}')">送出</button>
          </div>
        </div>
      </div>`;
    }).filter(Boolean).join('');

    const lifeItems = [
      { icon: '🏃', label: '運動', val: food.exType ? `${food.exType}${food.exMin ? ' ' + food.exMin + '分鐘' : ''}` : null },
      { icon: '💧', label: '飲水', val: food.water ? food.water + 'ml' : null },
      { icon: '😴', label: '睡眠', val: food.sleep ? food.sleep + '小時' : null },
      { icon: '🚽', label: '排便', val: food.poop ? food.poop + '次' : null }
    ].filter(x => x.val);

    // Overall feedback: array
    const overallArr = Array.isArray(food.rdFeedbacks)
      ? food.rdFeedbacks
      : (food.rdFeedback ? [{ text: food.rdFeedback, at: food.rdFeedbackAt, id: 0 }] : []);

    const overallBubbles = overallArr.map((fb, fi) => `
      <div class="feedback-box" style="margin-bottom:10px">
        <div style="white-space:pre-wrap;font-size:13px">${fb.text}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
          <span style="font-size:10px;color:var(--g4)">${fb.at ? new Date(fb.at).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : ''}</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm" style="font-size:11px;padding:3px 10px;background:#fff;border:1px solid var(--teal);color:var(--teal);border-radius:5px;cursor:pointer"
              onclick="startEditOverallFb(${fi},\`${fb.text.replace(/`/g,'&#96;')}\`)">✏️ 編輯</button>
            <button class="btn btn-sm" style="font-size:11px;padding:3px 10px;background:#fff;border:1px solid var(--red);color:var(--red);border-radius:5px;cursor:pointer"
              onclick="deleteOverallFeedback('${s.id}','${selectedFeedbackDay}',${fi})">🗑️ 刪除</button>
          </div>
        </div>
      </div>`).join('');

    contentHTML = `
      ${mealBlocks || '<div class="text-muted" style="padding:12px 0">飲食內容為空</div>'}
      ${lifeItems.length ? `<div class="life-chips">${lifeItems.map(x => `<span class="life-chip">${x.icon} ${x.label}：${x.val}</span>`).join('')}</div>` : ''}
      ${food.moodScore !== undefined && food.moodScore !== null ? (() => {
        const s = Number(food.moodScore);
        const color = s <= 3 ? '#ef4444' : s <= 6 ? '#f59e0b' : '#22c55e';
        const emoji = s <= 3 ? '😔' : s <= 6 ? '😐' : '😊';
        return `<div style="margin-top:10px;padding:10px 12px;background:${s <= 3 ? '#fee2e2' : s <= 6 ? '#fef3c7' : '#dcfce7'};border-radius:8px;display:flex;align-items:center;gap:10px">
          <span style="font-size:22px">${emoji}</span>
          <div>
            <div style="font-size:12px;font-weight:700;color:var(--g6)">今日心情</div>
            <div style="font-size:15px;font-weight:700;color:${color}">${s} 分${food.moodNote ? '　' + food.moodNote : ''}</div>
          </div>
        </div>`;
      })() : ''}
      ${food.lifeNote ? `<div style="margin-top:12px;padding:12px;background:var(--amber-light);border-radius:8px;font-size:13px;line-height:1.7">📝 <strong>飲食札記：</strong>${food.lifeNote}</div>` : ''}

      <div class="divider"></div>
      <div style="font-size:14px;font-weight:700;color:var(--g7);margin-bottom:4px">📝 整日總結回饋</div>
      <div style="font-size:12px;color:var(--g4);margin-bottom:10px">可送出多則，每則可獨立編輯或刪除</div>
      ${overallBubbles}
      <div id="overall-edit-wrap" style="display:none;margin-bottom:10px">
        <textarea id="overall-edit-ta" rows="3" style="width:100%;border:1.5px solid var(--teal);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;outline:none"></textarea>
        <div style="display:flex;gap:8px;margin-top:6px;justify-content:flex-end">
          <button class="btn btn-outline btn-sm" onclick="document.getElementById('overall-edit-wrap').style.display='none'">取消</button>
          <button class="btn btn-teal btn-sm" onclick="saveEditOverallFb('${s.id}','${selectedFeedbackDay}')">更新</button>
        </div>
      </div>
      <textarea class="feedback-input" id="fb-input" placeholder="新增一則整日總結…"></textarea>
      <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;flex-wrap:wrap">
        <div style="display:flex;gap:6px;align-items:center;flex:1">
          <select id="template-select" onchange="insertSelectedTemplate(this)" style="flex:1;padding:6px 10px;border:1.5px solid var(--g2);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;cursor:pointer" title="選擇常用語句插入">
            <option value="">📋 選擇常用語句…</option>
            ${getRdTemplates().map((t,i) => `<option value="${i}">${t.length > 30 ? t.slice(0,30)+'…' : t}</option>`).join('')}
            <option value="__add__">＋ 新增自訂語句</option>
          </select>
        </div>
        <button class="btn btn-teal" onclick="saveFeedback('${s.id}','${selectedFeedbackDay}')">✅ 新增總結回覆</button>
      </div>

      <div class="divider" style="margin-top:16px"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px">
        <div style="font-size:13px;color:var(--g5)">
          ${food.rdFeedbackDone ? `<span style="color:var(--teal);font-weight:700">✅ 已通知學員回饋完成</span>` : '完成回饋後，點右側按鈕通知學員'}
        </div>
        <button class="btn btn-teal" onclick="notifyFeedbackDone('${s.id}','${selectedFeedbackDay}')">
          📣 通知學員：回饋完成
        </button>
      </div>`;
  }

  return `
  <div class="page-header">
    <h1>飲食回覆</h1>
    <p>查看學員每日飲食並給予專業回饋</p>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">${studentTabs}</div>

  <div class="card" style="margin-bottom:12px;padding:12px 14px">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">🔍</span>
      <input id="fb-search-input" type="text" value="${feedbackSearchKeyword}"
        placeholder="搜尋飲食關鍵字（例：星巴克、炸雞、珍奶）…"
        style="flex:1;border:1.5px solid var(--g2);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none"
        onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'"
        oninput="feedbackSearchKeyword=this.value"
        onkeydown="if(event.key==='Enter'){document.getElementById('main-content').innerHTML=renderFeedback();}">
      <button class="btn btn-teal btn-sm" onclick="feedbackSearchKeyword=document.getElementById('fb-search-input').value;document.getElementById('main-content').innerHTML=renderFeedback()">搜尋</button>
    </div>
  </div>

  ${searchResultHTML}

  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <div class="student-avatar">${s.name.charAt(0)}</div>
      <div>
        <div class="fw7">${s.name}｜${s.phone}</div>
        <div class="text-muted">目標：${s.goal}｜第 ${s.period} 期</div>
      </div>
    </div>
  </div>

  <div style="overflow-x:auto;margin-bottom:12px">
    <div class="card" style="padding:14px 16px">
      ${weekNavHTML}
      <div style="font-size:11px;color:var(--g4);margin-top:6px;display:flex;gap:12px">
        <span>🔴 待回覆</span><span style="color:var(--teal)">🟢 已回覆</span><span>— 未上傳</span>
      </div>
    </div>
  </div>

  <div class="card">${contentHTML}</div>`;
}

function switchFeedbackStudent(id) {
  feedbackStudentId = id;
  selectedFeedbackDay = todayStr();
  document.getElementById('main-content').innerHTML = renderFeedback();
}

function selectFeedbackDay(d) {
  selectedFeedbackDay = d;
  document.getElementById('main-content').innerHTML = renderFeedback();
}

function openFeedbackForStudent(id, day) {
  feedbackStudentId = id;
  selectedFeedbackDay = day;
  showSection('feedback');
}

// ── 送入收件夾 helper ──
function pushInbox(studentId, msg) {
  const key = `inbox_${studentId}`;
  const arr = gs(key) || [];
  arr.push({ ...msg, at: new Date().toISOString(), read: false });
  // keep last 50
  if (arr.length > 50) arr.splice(0, arr.length - 50);
  ss(key, arr);
}

function saveFeedback(studentId, day) {
  const text = document.getElementById('fb-input')?.value?.trim();
  if (!text) { showToast('請先輸入回覆內容'); return; }
  const existing = gs(`food_${studentId}_${day}`) || {};
  const arr = Array.isArray(existing.rdFeedbacks) ? existing.rdFeedbacks
    : (existing.rdFeedback ? [{ text: existing.rdFeedback, at: existing.rdFeedbackAt }] : []);
  arr.push({ text, at: new Date().toISOString() });
  existing.rdFeedbacks = arr;
  existing.rdFeedback = text; // backward compat
  existing.rdFeedbackAt = new Date().toISOString();
  ss(`food_${studentId}_${day}`, existing);
  showToast('✅ 總結回覆已送出！');
  document.getElementById('main-content').innerHTML = renderFeedback();
  updateBadge();
}

function startEditOverallFb(idx, text) {
  const wrap = document.getElementById('overall-edit-wrap');
  const ta = document.getElementById('overall-edit-ta');
  if (!wrap || !ta) return;
  ta.value = text;
  ta.dataset.idx = idx;
  wrap.style.display = 'block';
}

function saveEditOverallFb(studentId, day) {
  const ta = document.getElementById('overall-edit-ta');
  if (!ta) return;
  const text = ta.value.trim();
  const idx = parseInt(ta.dataset.idx);
  if (!text) { showToast('內容不能為空'); return; }
  const existing = gs(`food_${studentId}_${day}`) || {};
  const arr = Array.isArray(existing.rdFeedbacks) ? existing.rdFeedbacks : [];
  if (arr[idx]) { arr[idx].text = text; arr[idx].editedAt = new Date().toISOString(); }
  existing.rdFeedbacks = arr;
  existing.rdFeedback = arr[arr.length - 1]?.text || '';
  ss(`food_${studentId}_${day}`, existing);
  showToast('✅ 已更新！');
  document.getElementById('main-content').innerHTML = renderFeedback();
}

function saveMealFeedback(studentId, day, mealKey) {
  const input = document.getElementById(`meal-fb-${mealKey}`);
  const text = input?.value?.trim();
  if (!text) { showToast('請先輸入回饋內容'); return; }
  const existing = gs(`food_${studentId}_${day}`) || {};
  const arr = Array.isArray(existing[mealKey + '_rdFeedbacks']) ? existing[mealKey + '_rdFeedbacks']
    : (existing[mealKey + '_rdFeedback'] ? [{ text: existing[mealKey + '_rdFeedback'], at: existing[mealKey + '_rdFeedbackAt'] }] : []);
  arr.push({ text, at: new Date().toISOString() });
  existing[mealKey + '_rdFeedbacks'] = arr;
  existing[mealKey + '_rdFeedback'] = text;
  existing[mealKey + '_rdFeedbackAt'] = new Date().toISOString();
  ss(`food_${studentId}_${day}`, existing);
  showToast('✅ 餐別回饋已送出！');
  if (input) input.value = '';
  document.getElementById('main-content').innerHTML = renderFeedback();
  updateBadge();
}

function startEditMealFb(mealKey, idx, text) {
  const wrap = document.getElementById(`meal-edit-wrap-${mealKey}`);
  const ta = document.getElementById(`meal-edit-ta-${mealKey}`);
  if (!wrap || !ta) return;
  ta.value = text;
  ta.dataset.idx = idx;
  wrap.style.display = 'block';
}

function saveEditMealFb(studentId, day, mealKey) {
  const ta = document.getElementById(`meal-edit-ta-${mealKey}`);
  if (!ta) return;
  const text = ta.value.trim();
  const idx = parseInt(ta.dataset.idx);
  if (!text) { showToast('內容不能為空'); return; }
  const existing = gs(`food_${studentId}_${day}`) || {};
  const arr = Array.isArray(existing[mealKey + '_rdFeedbacks']) ? existing[mealKey + '_rdFeedbacks'] : [];
  if (arr[idx]) { arr[idx].text = text; arr[idx].editedAt = new Date().toISOString(); }
  existing[mealKey + '_rdFeedbacks'] = arr;
  existing[mealKey + '_rdFeedback'] = arr[arr.length - 1]?.text || '';
  ss(`food_${studentId}_${day}`, existing);
  showToast('✅ 已更新！');
  document.getElementById('main-content').innerHTML = renderFeedback();
}

function deleteMealFeedback(studentId, day, mealKey, idx) {
  const existing = gs(`food_${studentId}_${day}`) || {};
  const arr = Array.isArray(existing[mealKey + '_rdFeedbacks']) ? existing[mealKey + '_rdFeedbacks'] : [];
  arr.splice(idx, 1);
  existing[mealKey + '_rdFeedbacks'] = arr;
  existing[mealKey + '_rdFeedback'] = arr[arr.length - 1]?.text || '';
  ss(`food_${studentId}_${day}`, existing);
  showToast('🗑️ 已刪除');
  document.getElementById('main-content').innerHTML = renderFeedback();
  updateBadge();
}

function deleteOverallFeedback(studentId, day, idx) {
  const existing = gs(`food_${studentId}_${day}`) || {};
  const arr = Array.isArray(existing.rdFeedbacks) ? existing.rdFeedbacks : [];
  if (idx !== undefined) arr.splice(idx, 1);
  else arr.length = 0;
  existing.rdFeedbacks = arr;
  existing.rdFeedback = arr[arr.length - 1]?.text || '';
  if (!arr.length) { delete existing.rdFeedbackDone; }

// ── 拖曳排序 ──
let _dragId = null;
function onDragStart(e, id) { _dragId = id; e.currentTarget.style.opacity = '0.4'; }
function onDragOver(e) { e.preventDefault(); e.currentTarget.style.background = 'var(--teal-light)'; }
function onDragEnd() {
  document.querySelectorAll('[data-id]').forEach(r => { r.style.opacity = ''; r.style.background = ''; });
  _dragId = null;
}
function onDrop(e, targetId) {
  e.preventDefault(); e.currentTarget.style.background = '';
  if (!_dragId || _dragId === targetId) return;
  const all = getMyStudents();
  const savedOrder = gs(`rd_order_${currentRD.id}`) || all.map(s => s.id);
  const savedStatus = gs(`rd_status_${currentRD.id}`) || {};
  all.forEach(s => { if (savedStatus[s.id]) s.status = savedStatus[s.id]; });
  const allIds = [...new Set([...savedOrder, ...all.map(s => s.id)])];
  const activeIds = allIds.filter(id => { const s = all.find(x => x.id === id); return s && s.status !== 'ended'; });
  const fi = activeIds.indexOf(_dragId), ti = activeIds.indexOf(targetId);
  if (fi === -1 || ti === -1) return;
  activeIds.splice(fi, 1); activeIds.splice(ti, 0, _dragId);
  const endedIds = allIds.filter(id => !activeIds.includes(id));
  ss(`rd_order_${currentRD.id}`, [...activeIds, ...endedIds]);
  document.getElementById('main-content').innerHTML = renderStudents();
}

async function deleteStudent(studentId) {
  showLoading('刪除學員資料中…');
  await new Promise(r => setTimeout(r, 50));
  delete STUDENTS_DB[studentId];

  if (Array.isArray(currentRD.students)) {
    currentRD.students = currentRD.students.filter(id => id !== studentId);
  }

  // Remove from all rd lists
  const allRdIds = [...Object.keys(RD_USERS_STATIC), ...Object.keys(DYNAMIC_RD_USERS)];
  allRdIds.forEach(rdId => {
    const rdList = gs(`rd_students_${rdId}`) || [];
    if (rdList.includes(studentId)) ss(`rd_students_${rdId}`, rdList.filter(id => id !== studentId));
    const rdOrder = gs(`rd_order_${rdId}`) || [];
    if (rdOrder.includes(studentId)) ss(`rd_order_${rdId}`, rdOrder.filter(id => id !== studentId));
    const rdStatus = gs(`rd_status_${rdId}`) || {};
    if (rdStatus[studentId] !== undefined) { delete rdStatus[studentId]; ss(`rd_status_${rdId}`, rdStatus); }
  });

  // Delete from local cache & localStorage
  const keysToDelete = Object.keys(_cache).filter(k =>
    k.startsWith(`food_${studentId}`) || k.startsWith(`progress_${studentId}`) ||
    k.startsWith(`goals_${studentId}`) || k.startsWith(`daily_goals_${studentId}`) ||
    k.startsWith(`wplan_${studentId}`) || k.startsWith(`menus_${studentId}`) ||
    k.startsWith(`ency_${studentId}`) || k.startsWith(`intake_${studentId}`) ||
    k.startsWith(`btNote_${studentId}`) || k.startsWith(`body_notif_${studentId}`) ||
    k.startsWith(`inbox_${studentId}`) || k === `dynuser_${studentId}`
  );
  keysToDelete.forEach(k => { delete _cache[k]; try { localStorage.removeItem('cd_' + k); } catch {} });

  // Delete from Supabase — fetch all matching keys then delete
  try {
    const prefixes = [
      `food_${studentId}`, `progress_${studentId}`, `goals_${studentId}`,
      `daily_goals_${studentId}`, `wplan_${studentId}`, `menus_${studentId}`,
      `ency_${studentId}`, `intake_${studentId}`, `btNote_${studentId}`,
      `body_notif_${studentId}`, `inbox_${studentId}`, `dynuser_${studentId}`
    ];
    const filter = prefixes.map(p => `key.like.${p}%`).join(',') + `,key.eq.dynuser_${studentId}`;
    await fetch(`${SB_URL}/rest/v1/cd?or=(${filter})`, { method: 'DELETE', headers: SB_HDRS });
  } catch(e) { console.warn('Supabase delete error:', e); }

  hideLoading();
  closeModal();
  showToast('🗑️ 學員及所有資料已完全刪除');
  document.getElementById('main-content').innerHTML = renderStudentsPage();
}

async function importFromGForm(studentId) {
  const urlInput = document.getElementById(`gform-csv-url-${studentId}`);
  const url = urlInput?.value?.trim();
  if (!url) {
    showToast('⚠️ 請先貼上 Google 試算表 CSV 網址');
    return;
  }
  // Save URL for next time
  ss(`gform_url_${studentId}`, url);

  showLoading('從 Google 試算表匯入中…');
  try {
    // Use a CORS proxy to fetch the CSV
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    const json = await res.json();
    const csvText = json.contents;
    if (!csvText) throw new Error('無法讀取試算表內容');

    const rows = parseCSV(csvText);
    if (rows.length < 2) throw new Error('試算表沒有資料');

    // Find last row (most recent submission)
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const lastRow = rows[rows.length - 1];

    // Flexible field mapping — matches common Chinese/English field names
    const get = (...keys) => {
      for (const k of keys) {
        const idx = headers.findIndex(h => h.includes(k.toLowerCase()));
        if (idx >= 0 && lastRow[idx]?.trim()) return lastRow[idx].trim();
      }
      return '';
    };

    const imported = {
      name:          get('姓名', '名字', 'name', '您的姓名', '請問您的姓名'),
      phone:         get('電話', '手機', 'phone', '聯絡電話', '手機號碼', '您的手機'),
      gender:        get('性別', 'gender', '您的性別', '生理性別'),
      age:           get('年齡', '年紀', 'age', '請問您幾歲', '您的年齡'),
      height:        get('身高', 'height', '您的身高', '請問您的身高'),
      weight:        get('體重', 'weight', '現在體重', '目前體重', '您的體重'),
      bodyFat:       get('體脂', 'body fat', 'fat', '體脂率', '您的體脂'),
      activityLevel: get('活動量', '活動', '工作型態', 'activity', '日常活動', '生活型態'),
      disease:       get('疾病', '慢性', '病史', 'disease', '健康狀況', '慢性疾病', '既往病史'),
      medication:    get('藥物', '保健', 'medication', '藥', '服用', '補充品'),
      // Goals
      goal:          get('目標', '課程目標', 'goal', '希望達成', '您的目標', '想要'),
      targetWeight:  get('目標體重', 'target weight', '希望體重', '理想體重'),
      targetFat:     get('目標體脂', 'target fat', '希望體脂'),
      // Diet
      mealTimes:     get('用餐時間', '幾餐', '餐次', 'meal', '一天幾餐', '飲食頻率'),
      foodAllergy:   get('過敏', '不能吃', 'allergy', '食物過敏', '禁忌食物'),
      foodDislike:   get('不喜歡', '不吃', '食物偏好', 'dislike', '討厭', '不愛吃'),
      eatOut:        get('外食', '自煮', 'eat out', '外食頻率', '自己煮'),
      // Lifestyle
      sleepTime:     get('睡覺', '睡眠時間', '幾點睡', '就寢', '入睡'),
      wakeTime:      get('起床', '幾點起', 'wake', '起床時間'),
      exerciseHabit: get('運動習慣', '運動', 'exercise', '運動頻率', '你有在運動'),
      waterIntake:   get('飲水', '喝水', 'water', '每日飲水', '水分攝取'),
      stressLevel:   get('壓力', 'stress', '生活壓力', '工作壓力'),
      notes:         get('備註', '其他', 'note', '補充', '想說', '其他補充'),
    };

    // Merge with existing intake
    const existing = gs(`intake_${studentId}`) || {};
    const merged = { ...existing };
    Object.entries(imported).forEach(([k, v]) => {
      if (v) merged[k] = v;
    });
    // Also map phone to intake.phone
    if (imported.phone) merged.phone = imported.phone;
    ss(`intake_${studentId}`, merged);

    // Also update student goal if imported
    if (imported.goal) {
      const s = STUDENTS_DB[studentId] || gs(`dynuser_${studentId}`) || {};
      s.goal = imported.goal;
      STUDENTS_DB[studentId] = s;
      const dynKey = `dynuser_${studentId}`;
      const existing2 = gs(dynKey) || {};
      existing2.goal = imported.goal;
      ss(dynKey, existing2);
    }

    hideLoading();
    showToast('✅ 匯入成功！建檔資料已自動填入');
    document.getElementById('main-content').innerHTML = renderIntakeCard(studentId);
  } catch(e) {
    hideLoading();
    showModal('⚠️ 匯入失敗', `
      <div class="notice amber" style="margin-bottom:12px">
        錯誤：${e.message}
      </div>
      <div style="font-size:13px;color:var(--g5);line-height:1.8">
        <strong>請確認以下步驟：</strong><br>
        1. 打開你的 Google 試算表<br>
        2. 上方選「檔案」→「共用」→「公開（任何人）」<br>
        3. 再選「檔案」→「下載」→「逗號分隔值 (.csv)」<br>
        4. <strong>不要用下載的檔案</strong>，改用這個格式的網址：<br>
        <code style="font-size:11px;background:var(--g1);padding:4px 8px;border-radius:4px;display:block;margin-top:4px;word-break:break-all">
          https://docs.google.com/spreadsheets/d/【試算表ID】/export?format=csv&gid=0
        </code>
      </div>`, [
      { label: '關閉', action: 'closeModal()', style: 'btn-outline' }
    ]);
  }
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { row.push(cur); cur = ''; continue; }
      cur += c;
    }
    row.push(cur);
    rows.push(row);
  }
  return rows;
}

function saveIntake(id, section) {
  const intake = gs(`intake_${id}`) || {};
  const g = sel => document.getElementById(sel)?.value?.trim() || '';

  if (section === 'basic') {
    Object.assign(intake, {
      name: g('ie-name'), email: g('ie-email'), gender: g('ie-gender'),
      age: g('ie-age'), height: g('ie-height'), weight: g('ie-weight'),
      bodyFat: g('ie-bodyfat'), activityLevel: g('ie-activity'),
      disease: g('ie-disease'), medication: g('ie-med')
    });
  } else if (section === 'goals') {
    Object.assign(intake, {
      goalWeight: g('ie-gw'), goalFat: g('ie-gf'), goalDeadline: g('ie-gd'),
      painPoint: g('ie-pain'), weightHistory: g('ie-hist')
    });
  } else if (section === 'diet') {
    Object.assign(intake, {
      weekdayMeal: g('ie-wdmeal'), weekendMeal: g('ie-wemeal'), mealContent: g('ie-mcontent'),
      hasSnack: g('ie-hassnack'), snackDays: g('ie-sdays'), snackTime: g('ie-stime'),
      snackContent: g('ie-scontent'), dietPref: g('ie-dpref'),
      dietTaboo: g('ie-dtaboo'), foodAllergy: g('ie-fallergy')
    });
  } else if (section === 'lifestyle') {
    Object.assign(intake, {
      exerciseFreq: g('ie-exfreq'), exerciseTypes: g('ie-extypes'),
      water: g('ie-water'), sleep: g('ie-sleep')
    });
  }

  ss(`intake_${id}`, intake);
  closeModal();
  showToast('✅ 建檔資料已儲存！');
  document.getElementById('main-content').innerHTML = renderIntakeCard(id);
}

const INTAKE_FORM_URL = 'https://forms.gle/D9EwNN93MZgT4xcr9';

async function submitAddStudent() {
  const name = document.getElementById('new-name')?.value?.trim();
  const phone = document.getElementById('new-phone')?.value?.trim();
  const pw = document.getElementById('new-pw')?.value?.trim();
  const period = document.getElementById('new-period')?.value;
  const start = document.getElementById('new-start')?.value?.replace(/-/g,'/');
  const end = document.getElementById('new-end')?.value?.replace(/-/g,'/');
  const goal = document.getElementById('new-goal')?.value?.trim();
  if (!name || !phone || !pw) { showToast('請填寫姓名、手機號碼和密碼'); return; }

  // Show loading while checking Supabase
  showLoading('確認學員資料…');
  // 直接查 Supabase（跨裝置同步），避免誤判
  let existingStudent = null;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/cd?key=eq.dynuser_${encodeURIComponent(phone)}&select=value`, { headers: SB_HDRS });
    if (res.ok) {
      const rows = await res.json();
      if (rows[0]?.value?.name) existingStudent = rows[0].value;
    }
  } catch(e) {}
  if (!existingStudent) {
    // 備援：local cache
    const localCheck = STUDENTS_DB[phone] || gs(`dynuser_${phone}`);
    if (localCheck && localCheck.name) existingStudent = localCheck;
  }
  if (existingStudent && existingStudent.name) {
    hideLoading();
    showToast(`⚠️ 手機號碼 ${phone} 已存在（${existingStudent.name}），請使用不同號碼`);
    return;
  }

  const studentData = {
    name, phone, password: pw,
    period: Number(period) || 1,
    start, end,
    goal: goal || '',
    rd: currentRD.id,
    week: 1,
    status: 'active',
    currentWeek: 1
  };

  // 1. Write to in-memory STUDENTS_DB immediately
  STUDENTS_DB[phone] = studentData;

  // 2. Update in-memory cache immediately (so renderStudents sees it right away)
  if (window._cache) _cache[`dynuser_${phone}`] = studentData;

  // 3. Add to rd's student list — both cache and storage
  if (!currentRD.students.includes(phone)) currentRD.students.push(phone);
  const rdStudentList = gs(`rd_students_${currentRD.id}`) || [];
  if (!rdStudentList.includes(phone)) rdStudentList.push(phone);
  if (window._cache) _cache[`rd_students_${currentRD.id}`] = rdStudentList;

  // 4. Persist to Supabase (ss handles cache + localStorage + Supabase write)
  ss(`dynuser_${phone}`, studentData);
  ss(`rd_students_${currentRD.id}`, rdStudentList);

  hideLoading();
  closeModal();
  document.getElementById('main-content').innerHTML = renderStudents();
  showIntakeModal(name, phone, pw);

  // 5. 背景重新同步，確保新學員資料完整進入 cache
  setTimeout(async () => {
    try { await warmCache(); updateBadge(); } catch(e) {}
  }, 1000);
}

function saveStudentInfo(studentId) {
  const startEl = document.getElementById(`edit-start-${studentId}`);
  const endEl   = document.getElementById(`edit-end-${studentId}`);
  const goalEl  = document.getElementById(`edit-goal-${studentId}`);
  if (!startEl) return;

  const start = startEl.value.replace(/-/g, '/');
  const end   = endEl?.value?.replace(/-/g, '/') || '';
  const goal  = goalEl?.value?.trim() || '';

  // Update in-memory STUDENTS_DB
  if (STUDENTS_DB[studentId]) {
    STUDENTS_DB[studentId].start = start;
    STUDENTS_DB[studentId].end   = end;
    STUDENTS_DB[studentId].goal  = goal;
  }

  // Merge into dynuser data and save to Firebase + localStorage
  // This syncs to the student app (student reads dynuser on login)
  const dyn = gs(`dynuser_${studentId}`) || {};
  dyn.start = start;
  dyn.end   = end;
  dyn.goal  = goal;
  if (window._cache) _cache[`dynuser_${studentId}`] = dyn;
  ss(`dynuser_${studentId}`, dyn);  // Supabase 同步，學員下次同步即看到

  showToast('✅ 課程資訊已更新！學員重新同步後日期即更新');

  // Refresh the intake card to reflect new dates
  document.getElementById('main-content').innerHTML = renderIntakeCard(studentId);
}

let btStudentId = null;

function renderBodyTrack() {
  const students = getActiveStudents();
  if (!btStudentId || !students.find(x => x.id === btStudentId)) {
    btStudentId = students[0]?.id || null;
  }
  const s = students.find(x => x.id === btStudentId);

  const studentTabs = students.map(st => {
    const notif = gs(`body_notif_${st.id}`);
    const hasNotif = notif && notif.notified && !notif.rdSeen;
    return `<button class="btn ${btStudentId === st.id ? 'btn-teal' : 'btn-outline'}" style="font-size:13px;padding:7px 14px;position:relative" onclick="switchBtStudent('${st.id}')">
      ${st.name}${hasNotif ? `<span style="position:absolute;top:-4px;right:-4px;width:10px;height:10px;background:#ef4444;border-radius:50%;border:2px solid #fff"></span>` : ''}
    </button>`;
  }).join('');

  if (!s) return `<div class="page-header"><h1>體態追蹤</h1></div><div class="empty-placeholder"><div class="ei">⚖️</div><p>尚無進行中學員</p></div>`;

  // Body notif banner for current student
  const bodyNotif = gs(`body_notif_${s.id}`);
  const showBodyBanner = bodyNotif && bodyNotif.notified && !bodyNotif.rdSeen;
  const bodyBannerHTML = showBodyBanner ? `
    <div style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1.5px solid #3b82f6;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <div style="font-size:24px">⚖️</div>
      <div style="flex:1">
        <div style="font-weight:700;color:#1e40af;font-size:14px">📣 ${s.name} 已上傳體重並通知你！</div>
        <div style="font-size:12px;color:#3b82f6;margin-top:2px">${bodyNotif.notifiedAt ? new Date(bodyNotif.notifiedAt).toLocaleString('zh-TW') : ''}</div>
      </div>
      <button class="btn btn-outline btn-sm" style="border-color:#3b82f6;color:#3b82f6;flex-shrink:0;font-size:12px" onclick="markBodyNotifSeen('${s.id}')">已確認</button>
    </div>` : '';

  const intake = gs(`intake_${s.id}`) || {};

  // Dynamic weeks based on student's actual course dates
  const sDates = buildStudentDates(s.start, s.end);
  const wGroups = buildWeekGroups(sDates);
  const totalWeeks = wGroups.length || 1;

  // Build prog with correct number of weeks
  const savedProg = gs(`progress_${s.id}`) || [];
  const prog = Array.from({ length: totalWeeks }, (_, i) =>
    savedProg[i] || { week: `W${i+1}`, weight: null, fat: null, waist: null, muscle: null }
  );

  // Stats
  const startW  = intake.weight   ? parseFloat(intake.weight)   : null;
  const startF  = intake.bodyFat  ? parseFloat(intake.bodyFat)  : null;
  const latestW = [...prog].reverse().find(p => p && p.weight);
  const latestF = [...prog].reverse().find(p => p && p.fat);
  const goalW   = intake.goalWeight ? parseFloat(intake.goalWeight) : null;
  const goalF   = intake.goalFat    ? parseFloat(intake.goalFat)    : null;

  const diffW = (startW && latestW) ? (latestW.weight - startW).toFixed(1) : null;
  const diffF = (startF && latestF) ? (latestF.fat - startF).toFixed(1) : null;
  const remainW = (goalW && latestW) ? (latestW.weight - goalW).toFixed(1) : null;

  // Mini sparkline data for weight
  const wData = prog.map(p => p.weight || null);
  const allW = wData.filter(Boolean);
  const maxW = allW.length ? Math.max(...allW) : 70;
  const minW = allW.length ? Math.min(...allW) : 60;
  const range = (maxW - minW) || 1;

  const sparkPoints = wData.map((w, i) => {
    const x = 20 + i * 60;
    const y = w ? 60 - ((w - minW) / range * 44) : null;
    return { x, y, w };
  });

  const sparkLine = sparkPoints.filter(p => p.y !== null).map((p, i, arr) =>
    i === 0 ? `M${p.x},${p.y}` : `L${p.x},${p.y}`
  ).join(' ');

  const sparkDots = sparkPoints.filter(p => p.y !== null).map(p =>
    `<circle cx="${p.x}" cy="${p.y}" r="5" fill="var(--teal)" stroke="#fff" stroke-width="2"/>
     <text x="${p.x}" y="${p.y - 10}" text-anchor="middle" font-size="10" fill="var(--g5)">${p.w}kg</text>`
  ).join('');

  const sparkLabels = wGroups.map((wg, i) =>
    `<text x="${20 + i*60}" y="78" text-anchor="middle" font-size="10" fill="var(--g4)">W${i+1}</text>`
  ).join('');

  // Table rows — editable inline
  const rows = prog.map((p, i) => `
    <tr>
      <td class="fw7" style="color:var(--teal)">W${i+1}</td>
      <td><input type="number" step="0.1" value="${p.weight || ''}" placeholder="--" style="width:70px;border:1.5px solid var(--g2);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;outline:none" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'" data-si="${i}" data-sf="weight" onchange="updateBtProg(this,'${s.id}')"></td>
      <td><input type="number" step="0.1" value="${p.fat || ''}" placeholder="--" style="width:60px;border:1.5px solid var(--g2);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;outline:none" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'" data-si="${i}" data-sf="fat" onchange="updateBtProg(this,'${s.id}')"></td>
      <td><input type="number" step="0.1" value="${p.waist || ''}" placeholder="--" style="width:60px;border:1.5px solid var(--g2);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;outline:none" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'" data-si="${i}" data-sf="waist" onchange="updateBtProg(this,'${s.id}')"></td>
      <td><input type="number" step="0.1" value="${p.muscle || ''}" placeholder="--" style="width:60px;border:1.5px solid var(--g2);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;outline:none" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'" data-si="${i}" data-sf="muscle" onchange="updateBtProg(this,'${s.id}')"></td>
    </tr>`).join('');

  return `
  <div class="page-header">
    <h1>體態追蹤</h1>
    <p>追蹤每位學員的身體數值變化，對照建檔目標評估進度</p>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">${studentTabs}</div>

  ${bodyBannerHTML}

  <!-- Student header -->
  <div class="card" style="margin-bottom:16px;padding:14px 18px">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div class="student-avatar" style="width:46px;height:46px;font-size:18px">${s.name.charAt(0)}</div>
      <div style="flex:1">
        <div class="fw7" style="font-size:15px">${s.name}</div>
        <div class="text-muted">目標：${goalW ? `體重 ${goalW}kg` : '——'}${goalF ? `｜體脂 ${goalF}%` : ''}　建檔體重：${startW ? startW + 'kg' : '——'}　建檔體脂：${startF ? startF + '%' : '——'}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn btn-outline btn-sm" onclick="refreshBodyTrack('${s.id}')">🔄 同步學員最新數值</button>
        <button class="btn btn-outline btn-sm" onclick="openIntakeCard('${s.id}');showSection('students')">查看建檔資料</button>
      </div>
    </div>
    <div style="margin-top:8px;font-size:12px;color:var(--g4);background:var(--g0);border-radius:6px;padding:6px 10px">
      💡 學員在 App 填寫體重後，點「🔄 同步學員最新數值」即可看到最新資料。營養師也可直接在欄位輸入更正。
    </div>
  </div>

  <!-- Summary stats -->
  <div class="grid4" style="margin-bottom:16px">
    <div class="stat-box">
      <div class="stat-val" style="font-size:22px">${latestW ? latestW.weight + 'kg' : '——'}</div>
      <div class="stat-label">最新體重</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="font-size:22px;color:${diffW !== null ? (diffW < 0 ? 'var(--teal)' : 'var(--red)') : 'var(--g8)'}">${diffW !== null ? (diffW > 0 ? '+' : '') + diffW + 'kg' : '——'}</div>
      <div class="stat-label">與建檔相比</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="font-size:22px;color:${remainW !== null ? (remainW <= 0 ? 'var(--teal)' : 'var(--amber)') : 'var(--g8)'}">${remainW !== null ? (remainW > 0 ? '還差 ' + remainW + 'kg' : '已達標 🎉') : '——'}</div>
      <div class="stat-label">距離目標</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="font-size:22px">${latestF ? latestF.fat + '%' : '——'}</div>
      <div class="stat-label">最新體脂</div>
    </div>
  </div>

  <!-- Chart -->
  ${allW.length > 0 ? `<div class="card" style="margin-bottom:16px">
    <div class="card-title">📈 體重趨勢</div>
    <svg width="100%" viewBox="0 0 280 90" style="overflow:visible">
      <polyline points="${sparkPoints.filter(p=>p.y!==null).map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="var(--teal)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="${sparkLine} L${sparkPoints.filter(p=>p.y!==null).slice(-1)[0].x},68 L${sparkPoints.filter(p=>p.y!==null)[0].x},68 Z" fill="var(--teal)" opacity="0.08"/>
      ${sparkDots}
      ${sparkLabels}
    </svg>
  </div>` : ''}

  <!-- Per-week: data + plan side by side -->
  ${Array.from({ length: totalWeeks }, (_, i) => i).map(i => {
    const p = prog[i] || {};
    const plan = gs(`wplan_${s.id}_${i+1}`) || {};
    const wLabel = wGroups[i] ? wGroups[i].label : `W${i+1}`;

    // CPVFDO badge renderer
    const parseCPV = str => {
      if (!str) return '<span style="color:var(--g3);font-size:12px">——</span>';
      return str.split('｜').map(part => {
        const letter = part.trim().charAt(0);
        const colors = {C:'#fef3c7,#92400e',P:'#ffe4e6,#9f1239',V:'#dcfce7,#166534',F:'#fce7f3,#9d174d',D:'#e0f2fe,#075985',O:'#f5f3ff,#5b21b6'};
        const c = colors[letter] ? colors[letter].split(',') : ['#f3f4f6','#374151'];
        return `<span style="display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:${c[0]};color:${c[1]};margin:2px 3px 2px 0">${part.trim()}</span>`;
      }).join('');
    };

    return `<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div style="font-size:15px;font-weight:700;color:var(--teal)">${wLabel}</div>
        <button class="btn btn-outline btn-sm" onclick="wpStudentId='${s.id}';wpWeek=${i+1};showSection('weekplan')">✏️ 編輯週計畫</button>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <!-- Left: Body numbers -->
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--g4);letter-spacing:0.5px;margin-bottom:8px;text-transform:uppercase">體態數值</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            ${[
              { label:'體重', field:'weight', unit:'kg', id:`bt-w${i}-weight` },
              { label:'體脂', field:'fat',    unit:'%',  id:`bt-w${i}-fat`    },
              { label:'腰圍', field:'waist',  unit:'cm', id:`bt-w${i}-waist`  },
              { label:'肌肉', field:'muscle', unit:'kg', id:`bt-w${i}-muscle` }
            ].map(col => `
              <div style="background:var(--g0);border-radius:8px;padding:8px 10px">
                <div style="font-size:11px;color:var(--g4);margin-bottom:3px">${col.label}</div>
                <div style="display:flex;align-items:center;gap:4px">
                  <input type="number" step="0.1" id="${col.id}" value="${p[col.field] || ''}" placeholder="--"
                    style="width:52px;border:1.5px solid var(--g2);border-radius:6px;padding:4px 6px;font-size:13px;font-weight:700;text-align:center;font-family:inherit;outline:none;background:#fff"
                    onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'"
                    data-si="${i}" data-sf="${col.field}" onchange="updateBtProg(this,'${s.id}')">
                  <span style="font-size:11px;color:var(--g4)">${col.unit}</span>
                </div>
              </div>`).join('')}
          </div>
          <button class="btn btn-teal btn-sm" style="margin-top:10px;width:100%" onclick="saveBtProgWeek('${s.id}',${i})">💾 儲存 W${i+1} 數值</button>
        </div>

        <!-- Right: Week plan -->
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--g4);letter-spacing:0.5px;margin-bottom:8px;text-transform:uppercase">週計畫</div>
          ${plan.calories || plan.breakfast ? `
            ${plan.calories ? `<div style="margin-bottom:6px;font-size:13px"><span style="color:var(--g5)">熱量：</span><strong>${plan.calories}</strong></div>` : ''}
            ${plan.breakfast ? `<div style="margin-bottom:6px">
              <div style="font-size:11px;color:var(--g4);margin-bottom:3px">早餐</div><div>${parseCPV(plan.breakfast)}</div>
            </div>` : ''}
            ${plan.lunch ? `<div style="margin-bottom:6px">
              <div style="font-size:11px;color:var(--g4);margin-bottom:3px">午餐</div><div>${parseCPV(plan.lunch)}</div>
            </div>` : ''}
            ${plan.dinner ? `<div style="margin-bottom:6px">
              <div style="font-size:11px;color:var(--g4);margin-bottom:3px">晚餐</div><div>${parseCPV(plan.dinner)}</div>
            </div>` : ''}
            ${plan.snack ? `<div style="margin-bottom:6px">
              <div style="font-size:11px;color:var(--g4);margin-bottom:3px">點心</div><div>${parseCPV(plan.snack)}</div>
            </div>` : ''}
            ${(() => {
              // Show total: manual if entered, otherwise auto-calc
              if (plan.total) return `<div style="margin-bottom:6px;padding:6px 8px;background:var(--teal-light);border-radius:6px"><div style="font-size:10px;color:var(--teal-dark);font-weight:700;margin-bottom:3px">整天合計</div><div>${parseCPV(plan.total)}</div></div>`;
              // Auto-calc
              const keys = ['C','P','V','F','D','O'];
              const totals = {C:0,P:0,V:0,F:0,D:0,O:0};
              [plan.breakfast, plan.lunch, plan.dinner, plan.snack].filter(Boolean).forEach(str => {
                str.split('｜').forEach(part => {
                  const t = part.trim(); const letter = t.charAt(0);
                  if (keys.includes(letter)) { const n = parseFloat(t.replace(letter,'').trim()); if (!isNaN(n)) totals[letter] += n; }
                });
              });
              const hasAny = Object.values(totals).some(v => v > 0);
              if (!hasAny) return '';
              const totalStr = keys.map(k => totals[k] > 0 ? `${k} ${totals[k]%1===0?totals[k]:totals[k].toFixed(1)}` : null).filter(Boolean).join('｜');
              return `<div style="margin-bottom:6px;padding:6px 8px;background:var(--teal-light);border-radius:6px"><div style="font-size:10px;color:var(--teal-dark);font-weight:700;margin-bottom:3px">整天合計</div><div>${parseCPV(totalStr)}</div></div>`;
            })()}
            ${plan.exercise ? `<div style="margin-bottom:4px;font-size:12px;color:var(--g6);line-height:1.5"><span style="color:var(--g4)">運動：</span>${plan.exercise}</div>` : ''}
            ${plan.note ? `<div style="font-size:12px;color:var(--g6);line-height:1.5"><span style="color:var(--g4)">備註：</span>${plan.note}</div>` : ''}
          ` : `<div style="color:var(--g3);font-size:13px;padding:16px 0;text-align:center">尚未設定週計畫<br><button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="wpStudentId='${s.id}';wpWeek=${i+1};showSection('weekplan')">前往設定</button></div>`}
        </div>
      </div>
    </div>`;
  }).join('')}

  <!-- Notes -->
  <div class="card">
    <div class="card-title">📝 追蹤備註</div>
    <textarea id="bt-note" rows="3" style="width:100%;border:1.5px solid var(--g2);border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;outline:none" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'" placeholder="記錄本學員的身體狀況變化觀察、特殊備註…">${gs(`btNote_${s.id}`) || ''}</textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-outline" onclick="saveBtNote('${s.id}')">儲存備註</button>
    </div>
  </div>`;
}

function markBodyNotifSeen(studentId) {
  const notif = gs(`body_notif_${studentId}`) || {};
  notif.rdSeen = true;
  notif.rdSeenAt = new Date().toISOString();
  ss(`body_notif_${studentId}`, notif);
  showToast('✅ 已確認');
  document.getElementById('main-content').innerHTML = renderBodyTrack();
  updateBadge();
}

function switchBtStudent(id) {
  btStudentId = id;
  document.getElementById('main-content').innerHTML = renderBodyTrack();
  window.scrollTo(0, 0);
}

function refreshBodyTrack(studentId) {
  // Data is already in shared localStorage — just re-render to pull latest values
  showToast('🔄 已同步學員最新數值');
  document.getElementById('main-content').innerHTML = renderBodyTrack();
  window.scrollTo(0, 0);
}

function updateBtProg(el, studentId) {
  const i = parseInt(el.dataset.si);
  const f = el.dataset.sf;
  const prog = gs(`progress_${studentId}`) || [{},{},{},{}];
  while (prog.length < 4) prog.push({});
  prog[i] = prog[i] || {};
  prog[i][f] = el.value ? parseFloat(el.value) : null;
  prog[i].week = 'W' + (i+1);
  ss(`progress_${studentId}`, prog);
}

function saveBtProg(studentId) {
  showNotifyDialog(
    studentId, 'bodytrack', '體態追蹤',
    () => NOTIFY_DEFAULTS.bodytrack('')
  );
  document.getElementById('main-content').innerHTML = renderBodyTrack();
}

function saveBtProgWeek(studentId, weekIdx) {
  showToast(`✅ W${weekIdx+1} 數值已儲存！`);
  document.getElementById('main-content').innerHTML = renderBodyTrack();
  window.scrollTo(0, 0);
}

function saveBtNote(studentId) {
  const note = document.getElementById('bt-note')?.value || '';
  ss(`btNote_${studentId}`, note);
  showToast('✅ 備註已儲存');
}

// ══════════════════════════════════════
// WEEK PLAN
// ══════════════════════════════════════
let wpStudentId = null;
let wpWeek = 1;

function renderWeekplan() {
  const students = getActiveStudents();
  // Validate wpStudentId — reset if not in active list
  if (!wpStudentId || !students.find(x => x.id === wpStudentId)) {
    wpStudentId = students[0]?.id || null;
    wpWeek = 1;
  }
  const s = students.find(x => x.id === wpStudentId);

  const studentTabs = students.map(st => `
    <button class="btn ${wpStudentId === st.id ? 'btn-teal' : 'btn-outline'}" style="font-size:13px;padding:7px 14px" onclick="switchWpStudent('${st.id}')">${st.name}</button>`).join('');

  if (!s) return `<div class="page-header"><h1>週計畫設定</h1></div><div class="empty-placeholder"><div class="ei">📋</div><p>尚無進行中學員</p></div>`;

  // Dynamic weeks based on student's course dates
  const sDates = buildStudentDates(s.start, s.end);
  const wGroups = buildWeekGroups(sDates);
  const totalWeeks = wGroups.length || 1;

  // Clamp wpWeek to valid range
  if (wpWeek > totalWeeks) wpWeek = 1;

  const weekTabs = wGroups.map((wg, wi) => `
    <button class="day-chip ${wi+1 === wpWeek ? 'active' : ''}" onclick="switchWpWeek(${wi+1})">${wg.label}</button>`).join('');

  const plan = gs(`wplan_${s.id}_${wpWeek}`) || {};
  const curGroup = wGroups[wpWeek - 1];
  const autoDate = curGroup ? `${curGroup.dates[0]} – ${curGroup.dates[curGroup.dates.length-1]}` : '';

  return `
  <div class="page-header">
    <h1>週計畫設定</h1>
    <p>為每位學員設定每週熱量、份數分配與備註</p>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">${studentTabs}</div>

  <div class="card" style="margin-bottom:16px;padding:14px 18px">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="student-avatar">${s.name.charAt(0)}</div>
      <div>
        <div class="fw7">${s.name}｜${s.goal}</div>
        <div class="text-muted">課程期間：${s.start || '——'} – ${s.end || '——'}（共 ${totalWeeks} 週）</div>
      </div>
    </div>
  </div>

  <div class="day-nav" style="margin-bottom:16px;flex-wrap:wrap">${weekTabs}</div>

  <div class="card">
    <div class="card-title">📅 W${wpWeek} 基本設定 <span style="font-size:12px;font-weight:400;color:var(--g4)">${autoDate}</span></div>
    <div class="fld-row">
      <div class="fld"><label>日期範圍</label><input type="text" id="wp-date" value="${plan.date || autoDate}" placeholder="自動填入"></div>
      <div class="fld"><label>熱量設定（大卡）</label><input type="number" id="wp-cal" value="${plan.calories ? plan.calories.replace(/[^0-9]/g,'') : ''}" placeholder="1600" inputmode="numeric"></div>
    </div>
    <div class="fld-row3">
      <div class="fld"><label>體重 kg</label><input type="number" id="wp-wt" value="${plan.weight || ''}" placeholder="--" step="0.1"></div>
      <div class="fld"><label>體脂 %</label><input type="number" id="wp-fat" value="${plan.fat || ''}" placeholder="--" step="0.1"></div>
      <div class="fld"><label>腰圍 cm</label><input type="number" id="wp-waist" value="${plan.waist || ''}" placeholder="--" step="0.1"></div>
    </div>
    <div class="fld">
      <label>📹 視訊 / 電話課程時間（學員首頁行事曆會顯示）</label>
      <input type="text" id="wp-session" value="${plan.session || ''}" placeholder="例：2026/06/04（四）晚上 8:00 視訊課程 30 分鐘">
    </div>
  </div>

  <div class="card">
    <div class="card-title">🍽️ 餐次份數分配（C 全穀｜P 豆魚蛋肉｜V 蔬菜｜F 水果｜D 乳品｜O 油脂）</div>
    <div style="font-size:11px;color:var(--g4);margin-bottom:12px">每格選擇份數，系統自動計算整天合計</div>
    ${['早餐','午餐','晚餐','點心'].map((meal, mi) => {
      const mealKey = ['b','l','d','s'][mi];
      const mealId = `wp-${mealKey}`;
      const saved = plan[['breakfast','lunch','dinner','snack'][mi]] || '';
      // Parse saved string like "C 1.5｜P 2｜V 1｜F 0｜D 0.5｜O 1"
      const parseVal = (str, letter) => {
        const m = str.match(new RegExp(letter + '\\s*([\\d.]+)'));
        return m ? m[1] : '0';
      };
      const cats = ['C','P','V','F','D','O'];
      const opts = [0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,6,7,8];
      const selects = cats.map(cat => {
        const val = parseVal(saved, cat);
        const options = opts.map(o => `<option value="${o}" ${parseFloat(val)===o?'selected':''}>${o}</option>`).join('');
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
          <div style="font-size:10px;font-weight:700;color:var(--teal)">${cat}</div>
          <select id="${mealId}-${cat.toLowerCase()}" onchange="autoCalcTotal()" style="width:100%;border:1.5px solid var(--g2);border-radius:6px;padding:5px 2px;font-size:13px;font-family:inherit;outline:none;text-align:center;background:#fff">${options}</select>
        </div>`;
      }).join('');
      return `<div style="margin-bottom:12px">
        <div style="font-size:12px;font-weight:700;color:var(--g6);margin-bottom:6px">${meal}</div>
        <div style="display:flex;gap:6px">${selects}</div>
      </div>`;
    }).join('')}
    <div style="background:var(--teal-light);border-radius:8px;padding:10px 12px;margin-top:4px">
      <div style="font-size:12px;font-weight:700;color:var(--teal-dark);margin-bottom:4px">整天份數合計（自動計算）</div>
      <div id="wp-total-display" style="font-size:13px;color:var(--teal-dark);font-weight:600">——</div>
      <input type="hidden" id="wp-total">
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎯 本週小目標（學員 App 的「每週小目標」頁面）</div>
    <div id="wp-goals-list" style="margin-bottom:10px">
      ${(() => {
        const wGoals = gs(`goals_${s.id}_${wpWeek}`) || [];
        if (!wGoals.length) return `<div style="color:var(--g4);font-size:13px;padding:4px 0">尚未設定目標，請新增</div>`;
        return wGoals.map((g, i) => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <input type="text" id="wp-goal-${i}" value="${g.text || ''}" style="flex:1;padding:8px 12px;border:1.5px solid var(--g2);border-radius:8px;font-size:13px;font-family:inherit;outline:none" onfocus="this.style.borderColor='var(--teal)'" onblur="this.style.borderColor='var(--g2)'" placeholder="目標描述…">
            <button class="btn btn-sm" style="background:#fff;border:1.5px solid var(--red);color:var(--red);border-radius:8px;padding:6px 10px;cursor:pointer;flex-shrink:0;font-size:13px" onclick="removeWpGoal(${i})">✕</button>
          </div>`).join('');
      })()}
    </div>
    <button class="btn btn-outline btn-sm" onclick="addWpGoal()">＋ 新增目標</button>
    <div style="font-size:11px;color:var(--g4);margin-top:6px">儲存週計畫時會一起儲存，學員可在 App 打勾完成</div>
  </div>

  <div class="card">
    <div class="card-title">🏃 運動與備註</div>
    <div class="fld"><label>運動建議</label><textarea id="wp-ex" placeholder="例：每週至少運動 3 天，每次 30 分鐘有氧或重訓">${plan.exercise || ''}</textarea></div>
    <div class="fld"><label>備註（飲水、睡眠、其他注意事項）</label><textarea id="wp-note" placeholder="例：每天飲水至少 1500ml，睡前 2 小時不進食…">${plan.note || ''}</textarea></div>
  </div>

  <div style="display:flex;justify-content:flex-end;gap:8px">
    <button class="btn btn-teal" onclick="saveWeekplan('${s.id}',${wpWeek})">💾 儲存週計畫 → 同步至學員</button>
  </div>`;
}

function switchWpStudent(id) {
  wpStudentId = id; wpWeek = 1;
  document.getElementById('main-content').innerHTML = renderWeekplan();
  setTimeout(autoCalcTotal, 50);
}
function switchWpWeek(w) {
  wpWeek = w;
  document.getElementById('main-content').innerHTML = renderWeekplan();
  setTimeout(autoCalcTotal, 50);
}
